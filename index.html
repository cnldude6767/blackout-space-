<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BLACKOUT: SPACE</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family:'Courier New', monospace;
    display:flex; align-items:center; justify-content:center;
  }
  #wrap {
    position:relative;
    width:min(96vw, 1280px);
    aspect-ratio: 4 / 3;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 0 120px rgba(40,110,170,0.18);
  }
  canvas {
    width:100%; height:100%;
    display:block;
    background:#020308;
    image-rendering:pixelated;
    border:1px solid #14202c;
    box-shadow:0 0 70px rgba(40,110,170,0.16), inset 0 0 120px rgba(0,0,0,0.6);
    cursor:crosshair;
    animation: crtFlicker 6s infinite;
  }
  /* shared overlay base */
  #scan, #mask, #roll, #vignette {
    position:absolute; inset:0; pointer-events:none;
  }
  /* horizontal CRT scanlines */
  #scan {
    opacity:0.13;
    background:repeating-linear-gradient(0deg,
      rgba(120,180,220,0.10) 0px, rgba(120,180,220,0.10) 1px,
      transparent 2px, transparent 4px);
    mix-blend-mode:multiply;
  }
  /* vertical RGB aperture-grille phosphor mask */
  #mask {
    opacity:0.16;
    background:repeating-linear-gradient(90deg,
      rgba(255,40,60,0.16) 0px, rgba(255,40,60,0.16) 1px,
      rgba(40,255,90,0.16) 1px, rgba(40,255,90,0.16) 2px,
      rgba(60,90,255,0.16) 2px, rgba(60,90,255,0.16) 3px);
    mix-blend-mode:screen;
  }
  /* slow rolling refresh band */
  #roll {
    height:26%;
    inset:0 0 auto 0;
    background:linear-gradient(0deg,
      transparent 0%, rgba(150,210,255,0.05) 42%,
      rgba(190,228,255,0.10) 50%, rgba(150,210,255,0.05) 58%, transparent 100%);
    mix-blend-mode:screen;
    animation: crtRoll 9s linear infinite;
  }
  /* corner darkening + curvature */
  #vignette {
    box-shadow: inset 0 0 200px rgba(0,0,0,0.85);
    background: radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,0.5) 100%);
    border-radius:16px;
  }
  @keyframes crtRoll {
    0%   { transform: translateY(-110%); }
    100% { transform: translateY(500%); }
  }
  @keyframes crtFlicker {
    0%,92%,100% { opacity:1; }
    93%  { opacity:0.96; }
    94%  { opacity:1; }
    97%  { opacity:0.97; }
    98%  { opacity:1; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="720"></canvas>
  <div id="scan"></div>
  <div id="mask"></div>
  <div id="roll"></div>
  <div id="vignette"></div>
</div>
<script>
'use strict';

/* ---- audio: removed (voice/music files were too large to embed reliably) ---- */
/* ============================================================
   BLACKOUT: SPACE
   ============================================================ */

const C = document.getElementById('game');
const X = C.getContext('2d');
const W = C.width, H = C.height;          // 960 x 720

/* ---- shared palette (carried over from DUNES, shifted cold) ---- */
const COL = {
  bg:        '#020308',
  hull:      '#0c141c',
  hullHi:    '#1a2a38',
  hullLo:    '#060a0e',
  player:    '#e8c547',
  playerHi:  '#fff4b8',
  suit:      '#3366cc',
  suitHi:    '#6699ff',
  suitLo:    '#1a3380',
  textP:     '#bcd0e0',
  textD:     '#48606e',
  amber:     '#ffb24a',
  amberHi:   '#ffe0a0',
  red:       '#ff4838',
  redLo:     '#7a1810',
  green:     '#5dd6a8',
  cyan:      '#5dc8ff',
  cyanHi:    '#bff5ff',
  star1:     '#e8eaf0',
  star2:     '#a8c8ff',
  star3:     '#ffd8a8',
  panel:     '#0a1822',
  panelLit:  '#16384a',
};

/* ---- input ---- */
const keys = {};
const mouse = { x:0, y:0, down:false, justDown:false };
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if ([' ','arrowup','arrowdown','arrowleft','arrowright','e','f','r','m','escape','tab'].includes(e.key.toLowerCase())) e.preventDefault();
  ensureAudio();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
C.addEventListener('mousemove', e => {
  const r = C.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);
});
C.addEventListener('mousedown', e => {
  const r = C.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);
  mouse.down = true; mouse.justDown = true;
  ensureAudio();
});
window.addEventListener('mouseup', () => { mouse.down = false; });

/* ---- helpers ---- */
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function lerp(a,b,t){ return a+(b-a)*t; }
function dist(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return Math.sqrt(dx*dx+dy*dy); }
function rand(a,b){ return a+Math.random()*(b-a); }
function rectOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
/* ============================================================
   AUDIO  (procedural, same approach as DUNES playSfx)
   ============================================================ */
let _actx = null;
let _music = { on:false, nodes:[] };
function ensureAudio(){
  if (!_actx) {
    try { _actx = new (window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ _actx = null; }
  }
  if (_actx && _actx.state === 'suspended') _actx.resume();
  if (!_music.on && _actx) startMusic();
}
const _lastSfx = {};
function playSfx(name, opts={}){
  if (!_actx) return;
  const ctx = _actx, now = ctx.currentTime;
  if (_lastSfx[name] && now - _lastSfx[name] < 0.03) return;
  _lastSfx[name] = now;
  const vol = opts.volume!=null?opts.volume:0.4;
  try {
    if (name === 'beep') {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='square'; o.frequency.value=opts.freq||520;
      g.gain.setValueAtTime(vol*0.18, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.09);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.1);
    } else if (name === 'powerup') {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='triangle';
      o.frequency.setValueAtTime(220, now);
      o.frequency.exponentialRampToValueAtTime(880, now+0.3);
      g.gain.setValueAtTime(vol*0.25, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.35);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.36);
    } else if (name === 'plasma') {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sawtooth';
      o.frequency.setValueAtTime(680, now);
      o.frequency.exponentialRampToValueAtTime(140, now+0.16);
      g.gain.setValueAtTime(vol*0.22, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.18);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.2);
    } else if (name === 'hit') {
      const dur=0.12;
      const buf=ctx.createBuffer(1, ctx.sampleRate*dur, ctx.sampleRate);
      const d=buf.getChannelData(0);
      for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.04));
      const s=ctx.createBufferSource(); s.buffer=buf;
      const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=900;
      const g=ctx.createGain();
      g.gain.setValueAtTime(vol*0.5, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+dur);
      s.connect(f); f.connect(g); g.connect(ctx.destination); s.start(now);
    } else if (name === 'alarm') {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sawtooth';
      o.frequency.setValueAtTime(440, now);
      o.frequency.linearRampToValueAtTime(620, now+0.18);
      o.frequency.linearRampToValueAtTime(440, now+0.36);
      g.gain.setValueAtTime(vol*0.16, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.5);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.5);
    } else if (name === 'door') {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(120, now);
      o.frequency.linearRampToValueAtTime(300, now+0.4);
      g.gain.setValueAtTime(vol*0.2, now);
      g.gain.linearRampToValueAtTime(0.001, now+0.45);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.46);
    } else if (name === 'thud') {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(opts.freq||160, now);
      o.frequency.exponentialRampToValueAtTime(50, now+0.18);
      g.gain.setValueAtTime(vol*0.5, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.2);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.22);
    } else if (name === 'warn') {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='square';
      o.frequency.setValueAtTime(300, now);
      o.frequency.linearRampToValueAtTime(180, now+0.4);
      g.gain.setValueAtTime(vol*0.16, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.45);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.46);
    } else if (name === 'breach') {
      const dur=0.7;
      const buf=ctx.createBuffer(1, ctx.sampleRate*dur, ctx.sampleRate);
      const d=buf.getChannelData(0);
      for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.28));
      const s=ctx.createBufferSource(); s.buffer=buf;
      const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=420;
      const g=ctx.createGain();
      g.gain.setValueAtTime(vol*0.7, now);
      g.gain.exponentialRampToValueAtTime(0.001, now+dur);
      s.connect(f); f.connect(g); g.connect(ctx.destination); s.start(now);
    }
  } catch(e){}
}
function startMusic(){
  if (!_actx || _music.on) return;
  _music.on = true;
  const ctx = _actx;
  const master = ctx.createGain();
  master.gain.value = 0.10;
  master.connect(ctx.destination);
  // slow cold drone, two detuned oscillators + slow LFO
  const o1 = ctx.createOscillator(); o1.type='sine'; o1.frequency.value=55;
  const o2 = ctx.createOscillator(); o2.type='sine'; o2.frequency.value=55.5;
  const o3 = ctx.createOscillator(); o3.type='triangle'; o3.frequency.value=110;
  const g3 = ctx.createGain(); g3.gain.value=0.04;
  const lfo = ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.07;
  const lfoG = ctx.createGain(); lfoG.gain.value=0.05;
  lfo.connect(lfoG); lfoG.connect(master.gain);
  o1.connect(master); o2.connect(master);
  o3.connect(g3); g3.connect(master);
  o1.start(); o2.start(); o3.start(); lfo.start();
  _music.nodes = [o1,o2,o3,lfo];
}

/* ============================================================
   GAME STATE
   ============================================================ */
const G = {
  state: 'skipmenu',  // start on the skip menu instead of the title screen
  t: 0,
  fade: 0,
  fadeTarget: 0,
  _sk: undefined,
  shake: 0,
  deathT: 0,
};

let last = performance.now();

/* shared starfield used by several scenes */
function makeStars(n){
  const s = [];
  for (let i=0;i<n;i++){
    const r = Math.random();
    const depth = Math.random();             // 0 = far/dim, 1 = near/bright
    s.push({
      x: Math.random()*W,
      y: Math.random()*H,
      s: 1 + depth*2.2,
      tw: Math.random()*Math.PI*2,
      tsp: 1.6 + Math.random()*3.4,          // per-star twinkle speed
      sp: 6 + depth*40,                      // parallax tied to depth
      col: r<0.82 ? COL.star1 : (r<0.92 ? COL.star2 : COL.star3),
      bright: depth > 0.86,                  // brightest ~14% get a glow
    });
  }
  return s;
}
function drawStars(stars, t, scroll){
  X.save();
  for (const st of stars){
    const a = clamp(0.4 + Math.sin(t*st.tsp + st.tw)*0.45, 0, 1);
    let sx = st.x;
    if (scroll) { sx = (st.x - scroll*st.sp/40) % W; if (sx<0) sx+=W; }
    if (st.bright){
      const cx = sx + st.s/2, cy = st.y + st.s/2, gr2 = st.s*3.4;
      const g = X.createRadialGradient(cx, cy, 0, cx, cy, gr2);
      g.addColorStop(0, st.col);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      X.globalCompositeOperation = 'lighter';
      X.globalAlpha = a*0.5;
      X.fillStyle = g;
      X.fillRect(cx-gr2, cy-gr2, gr2*2, gr2*2);
      X.globalCompositeOperation = 'source-over';
    }
    X.globalAlpha = a;
    X.fillStyle = st.col;
    X.fillRect(sx, st.y, st.s, st.s);
  }
  X.globalAlpha = 1;
  X.restore();
}

/* shared: occasional shooting stars for space backdrops */
const METEORS = { list:[], timer: rand(1.5,4) };
function drawMeteors(dt){
  METEORS.timer -= dt;
  if (METEORS.timer <= 0){
    METEORS.timer = rand(2.6, 6.5);
    const fromLeft = Math.random() < 0.5;
    METEORS.list.push({
      x: fromLeft ? rand(0, W*0.35) : rand(W*0.65, W),
      y: rand(0, H*0.4),
      vx: (fromLeft?1:-1)*rand(300,440),
      vy: rand(150,250),
      life: 0, max: rand(0.7,1.15),
    });
  }
  X.save();
  X.globalCompositeOperation = 'lighter';
  X.lineCap = 'round';
  for (let i=METEORS.list.length-1; i>=0; i--){
    const m = METEORS.list[i];
    m.life += dt;
    if (m.life >= m.max){ METEORS.list.splice(i,1); continue; }
    m.x += m.vx*dt; m.y += m.vy*dt;
    const k = Math.sin(Math.PI * (m.life/m.max));   // fade in then out
    const tx = m.x - m.vx*0.12, ty = m.y - m.vy*0.12;
    const g = X.createLinearGradient(m.x, m.y, tx, ty);
    g.addColorStop(0, `rgba(205,232,255,${0.9*k})`);
    g.addColorStop(1, 'rgba(205,232,255,0)');
    X.strokeStyle = g; X.lineWidth = 2;
    X.beginPath(); X.moveTo(m.x,m.y); X.lineTo(tx,ty); X.stroke();
    X.fillStyle = `rgba(235,247,255,${k})`;
    X.fillRect(m.x-1, m.y-1, 2.5, 2.5);
  }
  X.restore();
}

/* shared: draw the escape ship (matches DUNES ending silhouette) */
function drawShip(cx, cy, scale, t){
  X.save();
  X.translate(cx, cy);
  X.scale(scale, scale);
  // engine glow (additive bloom)
  const flick = 0.7 + Math.sin(t*22)*0.3;
  X.save();
  X.globalCompositeOperation = 'lighter';
  const eg = X.createRadialGradient(0, 48, 0, 0, 48, 48);
  eg.addColorStop(0, `rgba(200,238,255,${0.7*flick})`);
  eg.addColorStop(0.4, `rgba(110,200,255,${0.4*flick})`);
  eg.addColorStop(1, 'rgba(70,150,255,0)');
  X.fillStyle = eg;
  X.fillRect(-48, 22, 96, 84);
  X.restore();
  // hull body
  X.fillStyle = COL.hullHi;
  X.beginPath();
  X.moveTo(0,-46); X.lineTo(20,-6); X.lineTo(26,30);
  X.lineTo(10,42); X.lineTo(-10,42); X.lineTo(-26,30);
  X.lineTo(-20,-6); X.closePath(); X.fill();
  X.fillStyle = COL.hull;
  X.beginPath();
  X.moveTo(0,-46); X.lineTo(6,-6); X.lineTo(8,38);
  X.lineTo(-8,38); X.lineTo(-6,-6); X.closePath(); X.fill();
  // cockpit
  X.fillStyle = COL.cyan;
  X.beginPath(); X.ellipse(0,-18,6,12,0,0,Math.PI*2); X.fill();
  X.fillStyle = COL.cyanHi;
  X.beginPath(); X.ellipse(-2,-22,2.5,5,0,0,Math.PI*2); X.fill();
  // fins
  X.fillStyle = COL.hullLo;
  X.beginPath(); X.moveTo(-20,-6); X.lineTo(-34,26); X.lineTo(-22,22); X.closePath(); X.fill();
  X.beginPath(); X.moveTo(20,-6); X.lineTo(34,26); X.lineTo(22,22); X.closePath(); X.fill();
  // engine nozzles
  X.fillStyle = `rgba(180,235,255,${flick})`;
  X.fillRect(-12,38,7,10);
  X.fillRect(5,38,7,10);
  X.restore();
}

/* ============================================================
   TITLE SCREEN
   ============================================================ */
const TITLE = { stars: makeStars(200), t:0, shipY: H*0.55 };
function drawTitle(dt){
  TITLE.t += dt;
  const sky = X.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#01020a');
  sky.addColorStop(0.55,'#04081a');
  sky.addColorStop(1,'#0a1230');
  X.fillStyle = sky; X.fillRect(0,0,W,H);
  drawStars(TITLE.stars, TITLE.t);
  drawMeteors(dt);

  // distant nebula (layered, additive for soft bloom)
  X.save();
  X.globalCompositeOperation = 'lighter';
  for (let i=0;i<5;i++){
    const nx = W*(0.16+i*0.18) + Math.sin(i*2.1+TITLE.t*0.05)*30;
    const ny = H*(0.30+Math.sin(i*1.6+TITLE.t*0.1)*0.14);
    const rad = 180 + i*40;
    const pulse = 0.12 + Math.sin(TITLE.t*0.3 + i)*0.04;
    const ng = X.createRadialGradient(nx,ny,0,nx,ny,rad);
    ng.addColorStop(0, `rgba(${60+i*22},${90+i*8},${175-i*16},${pulse})`);
    ng.addColorStop(0.5, `rgba(${40+i*16},${70+i*6},${140-i*12},${pulse*0.5})`);
    ng.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle = ng; X.fillRect(nx-rad-20,ny-rad-20,rad*2+40,rad*2+40);
  }
  X.restore();

  // drifting ship
  const sy = H*0.56 + Math.sin(TITLE.t*0.6)*14;
  X.save(); X.rotate(0); X.restore();
  drawShip(W*0.5, sy, 1.5, TITLE.t);

  // title text
  X.textAlign='center';
  X.fillStyle = COL.cyan;
  X.shadowColor='rgba(90,200,255,0.65)'; X.shadowBlur=30;
  X.font='bold 78px Courier New';
  X.fillText('BLACKOUT', W/2, H*0.28);
  X.fillStyle = COL.amber;
  X.shadowColor='rgba(255,170,70,0.6)';
  X.font='bold 92px Courier New';
  X.fillText('SPACE', W/2, H*0.28+86);
  X.shadowBlur=0;

  X.fillStyle = COL.textD;
  X.font='14px Courier New';
  X.fillText('the third descent  ·  a sequel to BLACKOUT · DUNES', W/2, H*0.28+118);

  // prompt
  const pulse = 0.5 + Math.sin(TITLE.t*4)*0.5;
  X.globalAlpha = pulse;
  X.fillStyle = COL.textP;
  X.font='bold 20px Courier New';
  X.fillText('PRESS  ENTER  TO BEGIN', W/2, H*0.84);
  X.globalAlpha=1;
  X.fillStyle = COL.textD;
  X.font='12px Courier New';
  X.fillText('press H for controls   ·   press TAB to skip ahead', W/2, H*0.84+26);

  if (keys['enter']) { keys['enter']=false; G.state='recap'; }
  if (keys['h'])     { keys['h']=false;     G.state='howto'; }
}

/* ============================================================
   RECAP  (bridges DUNES -> SPACE)
   ============================================================ */
const RECAP = { t:0, stars: makeStars(180), lines:[
  'BLACKOUT · DUNES — the desert kept walking. You did not.',
  'You reached the ship. It climbed. The towers fell away below.',
  '',
  'YOU ESCAPED.',
  '',
  'But escape is only a direction, not a destination.',
  'The desert planet shrinks behind you. The engine dies.',
  'Cabin lights gutter out, one bank at a time.',
  '',
  'You are adrift. No power. No heading. No answer on any channel.',
  'Something out here turned the lights off too.',
  '',
  'BLACKOUT · SPACE',
]};
function drawRecap(dt){
  RECAP.t += dt;
  X.fillStyle = '#01020a'; X.fillRect(0,0,W,H);
  drawStars(RECAP.stars, RECAP.t);
  drawMeteors(dt);
  // shrinking desert planet, lower left (continuity with DUNES ending)
  const pr = Math.max(60, 150 - RECAP.t*6);
  const px = W*0.16 + RECAP.t*5, py = H*0.82 + RECAP.t*4;
  const pg = X.createRadialGradient(px-pr*0.3, py-pr*0.3, pr*0.2, px,py,pr);
  pg.addColorStop(0,'#e8b87a'); pg.addColorStop(0.5,'#a87440');
  pg.addColorStop(0.85,'#5a3818'); pg.addColorStop(1,'#1a0a04');
  X.fillStyle = pg;
  X.beginPath(); X.arc(px,py,pr,0,Math.PI*2); X.fill();

  // far ship, drifting and dimming
  drawShip(W*0.72, H*0.34, 0.8, RECAP.t);

  X.textAlign='center';
  const startDelay = 0.6, per = 0.85;
  for (let i=0;i<RECAP.lines.length;i++){
    const a = clamp((RECAP.t - startDelay - i*per)/0.8, 0, 1);
    if (a<=0) continue;
    X.globalAlpha = a;
    const ln = RECAP.lines[i];
    if (ln === 'YOU ESCAPED.'){
      X.fillStyle = COL.amber; X.font='bold 30px Courier New';
    } else if (ln === 'BLACKOUT · SPACE'){
      X.fillStyle = COL.cyan; X.font='bold 26px Courier New';
    } else {
      X.fillStyle = COL.textP; X.font='15px Courier New';
    }
    X.fillText(ln, W/2, 120 + i*40);
  }
  X.globalAlpha=1;

  const done = RECAP.t > startDelay + RECAP.lines.length*per + 1.0;
  if (done){
    const pulse = 0.5+Math.sin(RECAP.t*4)*0.5;
    X.globalAlpha = pulse; X.fillStyle = COL.textD;
    X.font='14px Courier New';
    X.fillText('press ENTER to wake up', W/2, H-44);
    X.globalAlpha=1;
  }
  if (keys['enter'] && done){ keys['enter']=false; initAct1(); G.state='act1'; }
  if (keys['enter'] && !done){ keys['enter']=false; RECAP.t = startDelay + RECAP.lines.length*per + 1.1; }
}

    a.cam.x=lerp(a.cam.x, clamp(a.p.x-W/2,0,ACT1_W-W), 0.12);
    a.cam.y=lerp(a.cam.y, clamp(a.p.y-H/2,0,ACT1_H-H), 0.12);

function a1LidOpen(){ return clamp(ACT1.lid, 0, 1); }
function a1TipPhase(){ return clamp(ACT1.lid, 0, 1); }

function a1TargetRect(){
  const t=ACT1.target;
  return { x:t.x, y:t.y, w:t.w, d:t.d };
}
function a1BlockerRect(){
  const b=ACT1.blocker;
  const ed=ACT1.exitDoor;
  const needed = (ed.y + ed.d) - b.y + 24;
  const off = a1LidOpen() * needed;
  return { x:b.x, y:b.y+off, w:b.w, d:b.d };
}

function a1SolidRects(){
  const a=ACT1;
  const r=a.walls.map(w=>({x:w.x,y:w.y,w:w.w,d:w.d}));
  r.push({x:a.target.x, y:a.target.y, w:a.target.w, d:a.target.d});
  if (a1LidOpen()<0.95) r.push(a1BlockerRect());
  if (a1LidOpen()<0.95){
    const ed=ACT1.exitDoor;
    r.push({ x: ed.x-90, y: a.target.y - 10, w: 90,
             d: (ed.y+ed.d) - (a.target.y-10) + 20 });
  }
  if (a.craneT){
    r.push({ x:a.craneT.x, y:a.craneT.y, w:a.craneT.w, d:a.craneT.d });
  }
  return r;
}

function updateAct1(dt){
  const a=ACT1,p=a.p,sp=a.sp;
  a.totalT+=dt; a.phaseT+=dt; a.rig.t+=dt;
  if (a.msg){ a.msg.ttl-=dt; if (a.msg.ttl<=0) a.msg=null; }
  if (a.reject>0) a.reject-=dt;
  const eJust=keys['e']&&!a._eP; a._eP=keys['e'];
  const entJust=keys['enter']&&!a._entP; a._entP=keys['enter'];

  if (a.phase==='land'){
    p.x=lerp(p.x,280,dt*2.2);
    if (a.phaseT>1.6){ a.phase='explore'; a.phaseT=0;
      a1Msg('ALIEN CARGO HOLD','Find the marked crate. Read its number.',5); }
    a1Cam(); return;
  }

  if (a.view==='top'){
    const lock=(a.phase==='terminal'||a.phase==='unlock');
    let mx=0,my=0;
    if (!lock){
      if (keys['a']||keys['arrowleft']) mx-=1;
      if (keys['d']||keys['arrowright']) mx+=1;
      if (keys['w']||keys['arrowup']) my-=1;
      if (keys['s']||keys['arrowdown']) my+=1;
    }
    if (mx||my){
      const l=Math.hypot(mx,my)||1;
      const nx=p.x+(mx/l)*A1_SPEED*dt;
      const ny=p.y+(my/l)*A1_SPEED*dt;
      const R=a1SolidRects(), PR=12;
      let cx=nx, cy=p.y;
      for (const r of R) if (cx>r.x-PR&&cx<r.x+r.w+PR&&cy>r.y-PR&&cy<r.y+r.d+PR)
        cx=(mx>0)? r.x-PR : r.x+r.w+PR;
      let fy=ny;
      for (const r of R) if (cx>r.x-PR&&cx<r.x+r.w+PR&&fy>r.y-PR&&fy<r.y+r.d+PR)
        fy=(my>0)? r.y-PR : r.y+r.d+PR;
      p.x=cx; p.y=fy; p.fx=mx; p.fy=my; p.walk+=dt*9;
    }
    p.x=clamp(p.x,BAY.x0,BAY.x1); p.y=clamp(p.y,BAY.y0,BAY.y1);
    a1Cam();

    if (a.phase==='explore'){
      const near=(b)=> p.x>b.x-34&&p.x<b.x+b.w+34&&p.y>b.y-34&&p.y<b.y+(b.d||b.h)+34;
      const tg=a.target;
      if (!a.knowsNum && near(tg) && eJust){
        a.knowsNum=true; playSfx('beep',{freq:760,volume:0.3});
        a1Msg('MANIFEST READ','Now climb the crane to look up its code.',4.5);
      }
      if (!a.hasCode && near(a.craneT) && eJust){
        a.view='side'; a.phase='climb'; a.phaseT=0; a1BuildRig();
        sp.x=a.rig.baseX-10; sp.y=a.rig.floorY; sp.vx=0; sp.vy=0;
        sp.onGround=true; sp.facing=1;
        playSfx('door',{volume:0.4});
        a1Msg('CRANE — SIDE VIEW','Jump up the rig. ENTER at the bottom to leave.',4);
      }
      if (a.hasCode && near(tg) && eJust && a.lid<1){ a.phase='unlock'; a.entry=''; }
      return;
    }
    if (a.phase==='unlock'){
      if ((eJust || (keys['escape']&&!a._escP)) && a.phaseT>0.1){
        a.phase='explore'; a.entry=''; a.reject=0;
        playSfx('beep',{freq:300,volume:0.2});
        a._escP = keys['escape'];
        return;
      }
      a._escP = keys['escape'];
      a1ReadDigits(4);
      if (a.entry.length===4 && entJust){
        if (a.entry===a.code){
          a.phase='opening'; a.phaseT=0; G.shake=10;
          playSfx('door',{volume:0.6});
          a1Msg('CODE ACCEPTED','Lid opening — pushing the lower crate clear...',3);
        } else { a.reject=1.4; a.entry=''; playSfx('alarm',{volume:0.4}); }
      }
      return;
    }
    if (a.phase==='opening'){
      a.lid=clamp(a.lid+dt*0.42,0,1);
      if (Math.random()<0.35) G.shake=Math.max(G.shake,4);
      if (a.lid>=1){ a.phase='victory'; a.phaseT=0;
        playSfx('powerup',{volume:0.7}); a1Msg('PATH CLEAR','The exit door is unblocked.',3); }
      return;
    }
    if (a.phase==='victory'){
      if (a.phaseT>3.0){ initBriefing(); }
      return;
    }
    return;
  }

  if (a.view==='side'){
    const atBottom=sp.onGround && sp.y>=a.rig.floorY-2;
    if (atBottom && entJust && a.phase==='climb'){
      a.view='top'; a.phase='explore'; a.phaseT=0;
      playSfx('door',{volume:0.35});
      a1Msg('BACK IN THE MAZE', a.knowsNum?'You still have the manifest.'
                                           :'You still need the manifest.',3);
      a1Cam(); return;
    }
    let mx=0;
    if (a.phase==='climb'){
      if (keys['a']||keys['arrowleft']) mx-=1;
      if (keys['d']||keys['arrowright']) mx+=1;
    }
    sp.vx=mx*A1_SPEED;
    if (mx){ sp.facing=mx; sp.walk+=dt*8; }
    if (a.phase==='climb' && (keys['w']||keys['arrowup']) && sp.onGround && !sp._dropping){
      sp.vy=A1_JUMP; sp.onGround=false; playSfx('beep',{freq:300,volume:0.22});
    }
    const topDeck = a.rig.elems[a.rig.elems.length-1];
    const inTermZone = a.phase==='climb' && sp._lastPlat===topDeck &&
                       Math.abs(sp.x-a.rig.topX)<70;
    const sDown = (keys['s']||keys['arrowdown']);
    if (a.phase==='climb' && sp.onGround && sp._lastPlat && sDown && !inTermZone){
      sp._sHoldT = (sp._sHoldT||0) + dt;
      if (sp._sHoldT >= 1.0){
        sp._dropping = sp._lastPlat;
        sp._dropTimer = 0.25;
        sp._sHoldT = 0;
        sp.vy = 60;
        sp.onGround = false;
        playSfx('beep',{freq:200,volume:0.2});
      }
    } else {
      sp._sHoldT = 0;
    }
    if (sp._dropTimer>0){
      sp._dropTimer -= dt;
      if (sp._dropTimer<=0) sp._dropping = null;
    }

    if (a.phase==='climb'){
      sp.vy+=A1_GRAV*dt;
      const prevY=sp.y;
      sp.x+=sp.vx*dt; sp.y+=sp.vy*dt;
      sp.onGround=false;
      sp._lastPlat = null;
      for (const e of a.rig.elems){
        if (sp._dropping===e) continue;
        const r=a1ElemRect(e,a.rig.t);
        if (sp.x>r.x-8&&sp.x<r.x+r.w+8&&prevY<=r.y+6&&sp.y>=r.y-6&&sp.vy>=0){
          sp.y=r.y; sp.vy=0; sp.onGround=true; sp._lastPlat=e;
          if (e.type==='slide') sp.x+=a1ElemRect(e,a.rig.t).x - a1ElemRect(e,a.rig.t-dt).x;
        }
      }
      if (sp.y>=a.rig.floorY){ sp.y=a.rig.floorY; sp.vy=0; sp.onGround=true; sp._lastPlat=null; }
      sp.x=clamp(sp.x,120,1100);
    } else {
      sp.vx=0; sp.vy=0; sp.onGround=true;
    }
    a1Cam();

    if (a.phase==='climb'){
      const topDeck=a.rig.elems[a.rig.elems.length-1];
      const onTop = sp._lastPlat===topDeck;
      const nearTerm = onTop && Math.abs(sp.x-a.rig.topX)<60;
      if (nearTerm && eJust){
        sp._sHoldT=0; sp._dropping=null; sp._dropTimer=0;
        if (!a.knowsNum){
          a.reject=1.6; playSfx('alarm',{volume:0.4});
          a1Msg('NO MANIFEST','Terminal needs the crate number. Go read it.',4);
          sp.vy=-260; sp.x-=24;
        } else {
          a.phase='terminal'; a.phaseT=0; a.entry=''; playSfx('door',{volume:0.4});
          sp.vx=0; sp.vy=0;
        }
      }
    }
    if (a.phase==='terminal'){
      const closing = a.hasCode
        ? (eJust || (keys['escape']&&!a._escP) || entJust)
        : (eJust || (keys['escape']&&!a._escP));
      if (closing && a.phaseT>0.1){
        a.phase='climb'; a.entry=''; a.reject=0;
        sp._sHoldT=0; sp._dropping=null; sp._dropTimer=0;
        sp.vy=-220;
        playSfx('beep',{freq:300,volume:0.2});
        a._escP = keys['escape'];
        return;
      }
      a._escP = keys['escape'];
      if (!a.hasCode){
        a1ReadDigits(3);
        if (a.entry.length===3 && entJust){
          if (a.entry===a.boxNum){
            a.hasCode=true; playSfx('powerup',{volume:0.55});
            a.entry='';
            a.phaseT=0;
          } else { a.reject=1.4; a.entry=''; playSfx('alarm',{volume:0.4}); }
        }
      }
    }
    return;
  }
}

function a1ReadDigits(maxLen){
  const a=ACT1;
  for (let n=0;n<=9;n++){
    const k=String(n);
    if (keys[k]&&!a['_d'+n]){ a['_d'+n]=true;
      if (a.entry.length<maxLen){ a.entry+=k; playSfx('beep',{freq:480+n*18,volume:0.25}); } }
    if (!keys[k]) a['_d'+n]=false;
  }
  if (keys['backspace']&&!a._dbk){ a._dbk=true; a.entry=a.entry.slice(0,-1); }
  if (!keys['backspace']) a._dbk=false;
}

function drawAct1(dt){
  const a=ACT1;
  if (a.view==='top') a1DrawTop(dt); else a1DrawSide(dt);
  a1DrawHUD(); a1DrawKeypad();
  if (a.phase==='victory'){
    const fa=clamp((a.phaseT-0.3)/2,0,1);
    X.globalAlpha=fa; X.textAlign='center';
    X.fillStyle=COL.green; X.font='bold 30px Courier New';
    X.fillText('ACT 1 CLEAR', W/2, H*0.4);
    X.fillStyle='#c9ccd2'; X.font='15px Courier New';
    X.fillText('The exit door is clear. Continue.', W/2, H*0.4+34);
    X.globalAlpha=1;
  }
}

/* ---- decor render ---- */
function a1DrawDecor(cx,cy,layer,t){
  const a=ACT1, d=a.decor; if (!d) return;
  if (layer==='floor'){
    X.strokeStyle='rgba(220,180,60,0.32)'; X.lineWidth=4;
    X.setLineDash([14,8]);
    for (const ln of d.lanes||[]){
      X.beginPath(); X.moveTo(ln.x1-cx, ln.y1-cy); X.lineTo(ln.x2-cx, ln.y2-cy); X.stroke();
    }
    X.setLineDash([]);
    for (const s of d.oilStains){
      const g=X.createRadialGradient(s.x-cx,s.y-cy,2,s.x-cx,s.y-cy,s.r);
      g.addColorStop(0,'rgba(8,10,14,0.55)');
      g.addColorStop(0.7,'rgba(8,10,14,0.22)');
      g.addColorStop(1,'rgba(8,10,14,0)');
      X.fillStyle=g; X.beginPath();
      X.ellipse(s.x-cx,s.y-cy,s.r,s.r*0.7,0,0,Math.PI*2); X.fill();
    }
    for (const p of d.puddles||[]){
      const g=X.createRadialGradient(p.x-cx,p.y-cy,1,p.x-cx,p.y-cy,p.r);
      g.addColorStop(0,'rgba(90,170,200,0.45)');
      g.addColorStop(0.7,'rgba(90,170,200,0.20)');
      g.addColorStop(1,'rgba(90,170,200,0)');
      X.fillStyle=g; X.beginPath();
      X.ellipse(p.x-cx,p.y-cy,p.r,p.r*0.65,0,0,Math.PI*2); X.fill();
      X.fillStyle='rgba(255,255,255,0.18)';
      X.fillRect(p.x-cx-p.r*0.4, p.y-cy-2, p.r*0.4, 2);
    }
    X.strokeStyle='rgba(0,0,0,0.20)'; X.lineWidth=2;
    for (const s of d.scuffs){
      X.beginPath();
      for (let i=0;i<6;i++){
        const xx=s.x-cx + (i*s.w/6), yy=s.y-cy + Math.sin(i*2.1)*4;
        if (i===0) X.moveTo(xx,yy); else X.lineTo(xx,yy);
      }
      X.stroke();
    }
    for (const dd of d.debris||[]){
      for (let i=0;i<dd.n;i++){
        const ang=(i*47+dd.x*0.13)%6.28;
        const rr=4+((i*7)%14);
        const dx=Math.cos(ang)*rr, dy=Math.sin(ang)*rr*0.7;
        X.fillStyle='rgba(170,200,220,0.55)';
        X.fillRect(dd.x-cx+dx, dd.y-cy+dy, 3, 2);
        X.fillStyle='rgba(0,0,0,0.4)';
        X.fillRect(dd.x-cx+dx+1, dd.y-cy+dy+1, 1, 1);
      }
    }
    X.font='bold 16px Courier New'; X.textAlign='left';
    for (const p of d.placards){
      X.fillStyle='rgba(20,22,28,0.35)';
      X.fillRect(p.x-cx-6, p.y-cy-12, p.text.length*11+12, 18);
      X.fillStyle='rgba(220,200,80,0.32)';
      X.fillText(p.text, p.x-cx, p.y-cy+2);
    }
  }
  if (layer==='wall'){
    X.strokeStyle='#3a3f47'; X.lineWidth=8;
    for (const p of d.pipes){
      X.beginPath();
      if (p.vert){ X.moveTo(p.x-cx, p.y-cy); X.lineTo(p.x-cx, p.y+p.len-cy); }
      else       { X.moveTo(p.x-cx, p.y-cy); X.lineTo(p.x+p.len-cx, p.y-cy); }
      X.stroke();
      X.strokeStyle='rgba(255,255,255,0.10)'; X.lineWidth=2;
      X.beginPath();
      if (p.vert){ X.moveTo(p.x-cx-3, p.y-cy); X.lineTo(p.x-cx-3, p.y+p.len-cy); }
      else       { X.moveTo(p.x-cx, p.y-cy-3); X.lineTo(p.x+p.len-cx, p.y-cy-3); }
      X.stroke();
      X.strokeStyle='#3a3f47'; X.lineWidth=8;
    }
    for (const pa of d.patches||[]){
      X.fillStyle='#4a4f57'; X.fillRect(pa.x-cx, pa.y-cy, pa.w, pa.h);
      X.fillStyle='rgba(255,255,255,0.08)'; X.fillRect(pa.x-cx, pa.y-cy, pa.w, 2);
      X.strokeStyle='rgba(0,0,0,0.55)'; X.lineWidth=1; X.strokeRect(pa.x-cx, pa.y-cy, pa.w, pa.h);
      X.fillStyle='#23262c';
      for (let i=4;i<(pa.h||pa.w);i+=8){
        if (pa.h>pa.w){ X.fillRect(pa.x-cx+2, pa.y-cy+i, 2, 2); X.fillRect(pa.x-cx+pa.w-4, pa.y-cy+i, 2, 2); }
        else          { X.fillRect(pa.x-cx+i, pa.y-cy+2, 2, 2); X.fillRect(pa.x-cx+i, pa.y-cy+pa.h-4, 2, 2); }
      }
    }
    for (const v of d.vents){
      X.fillStyle='#23262c'; X.fillRect(v.x-cx, v.y-cy, v.w, v.h);
      X.strokeStyle='#4a4f57'; X.lineWidth=1; X.strokeRect(v.x-cx, v.y-cy, v.w, v.h);
      X.strokeStyle='rgba(0,0,0,0.4)';
      if (v.vert){ for (let i=4;i<v.h;i+=4){ X.beginPath();
        X.moveTo(v.x-cx,v.y-cy+i); X.lineTo(v.x-cx+v.w,v.y-cy+i); X.stroke(); }
      } else { for (let i=4;i<v.w;i+=4){ X.beginPath();
        X.moveTo(v.x-cx+i,v.y-cy); X.lineTo(v.x-cx+i,v.y-cy+v.h); X.stroke(); }
      }
    }
    for (const fn of d.fans||[]){
      const fx=fn.x-cx, fy=fn.y-cy, s=fn.size;
      X.fillStyle='#1c1f24'; X.fillRect(fx-s/2, fy-2, s, 16);
      X.strokeStyle='#23262c'; X.lineWidth=2; X.strokeRect(fx-s/2, fy-2, s, 16);
      X.save(); X.translate(fx, fy+6); X.rotate(t*6);
      X.strokeStyle='#5a5f67'; X.lineWidth=3;
      for (let i=0;i<3;i++){
        X.rotate(Math.PI*2/3);
        X.beginPath(); X.moveTo(0,0); X.lineTo(s/2-4,0); X.stroke();
      }
      X.restore();
      X.strokeStyle='rgba(255,255,255,0.06)';
      for (let i=0;i<s;i+=3){ X.beginPath();
        X.moveTo(fx-s/2+i, fy-2); X.lineTo(fx-s/2+i, fy+14); X.stroke(); }
    }
    X.strokeStyle='rgba(40,30,20,0.45)'; X.lineWidth=2;
    for (const dr of d.drips||[]){
      X.beginPath(); X.moveTo(dr.x-cx, dr.y-cy);
      X.lineTo(dr.x-cx+2, dr.y-cy+dr.len); X.stroke();
      X.fillStyle='rgba(40,30,20,0.55)';
      X.fillRect(dr.x-cx-1, dr.y-cy+dr.len-2, 5, 4);
    }
    X.strokeStyle='#3a3f47'; X.lineWidth=2;
    for (const ch of d.chains||[]){
      const cxv=ch.x-cx;
      for (let i=0; i<ch.len; i+=6){
        X.beginPath();
        X.ellipse(cxv, ch.y-cy+i, 3, 5, (i%12===0)?Math.PI/2:0, 0, Math.PI*2);
        X.stroke();
      }
    }
    for (const pn of d.panels||[]){
      X.fillStyle='#23262c'; X.fillRect(pn.x-cx, pn.y-cy, pn.w, pn.h);
      X.strokeStyle='#4a4f57'; X.lineWidth=1; X.strokeRect(pn.x-cx, pn.y-cy, pn.w, pn.h);
      for (let i=0;i<4;i++){
        const lit = ((Math.floor(t*2)+i*3)%5)<3;
        X.fillStyle = lit ? (i%2?'#5dd6a8':'#ffd24a') : '#1a1d22';
        X.fillRect(pn.x-cx+4, pn.y-cy+8+i*10, 4, 4);
      }
      X.fillStyle='rgba(255,255,255,0.10)'; X.fillRect(pn.x-cx, pn.y-cy, pn.w, 2);
    }
    for (const s of d.signs||[]){
      X.fillStyle='#1c1f24'; X.fillRect(s.x-cx-1, s.y-cy-1, s.w+2, s.h+2);
      X.fillStyle=s.col; X.fillRect(s.x-cx, s.y-cy, s.w, s.h);
      X.fillStyle='#1c1f24'; X.font='bold 22px Courier New'; X.textAlign='center';
      X.fillText(s.txt, s.x-cx+s.w/2, s.y-cy+s.h-8);
    }
    X.strokeStyle='#1a1d22'; X.lineWidth=4;
    for (const c of d.cables){
      X.beginPath();
      for (let i=0;i<c.length;i++){
        if (i===0) X.moveTo(c[i][0]-cx, c[i][1]-cy);
        else X.lineTo(c[i][0]-cx, c[i][1]-cy);
      }
      X.stroke();
    }
    for (const L of d.deadLights||[]){
      X.fillStyle='#2a2d33'; X.fillRect(L.x-cx-26, L.y-cy, 52, 14);
      const flick = (Math.sin(t*17+L.x)*0.5+0.5)*(Math.random()<0.05?1:0);
      if (flick>0.3){
        X.fillStyle='rgba(255,220,120,'+(0.4*flick)+')';
        X.fillRect(L.x-cx-22, L.y-cy+2, 44, 6);
      } else {
        X.fillStyle='#3a3f47'; X.fillRect(L.x-cx-22, L.y-cy+2, 44, 6);
      }
    }
    for (const L of d.lights){
      const g=X.createRadialGradient(L.x-cx, L.y+90-cy, 4, L.x-cx, L.y+90-cy, 200);
      g.addColorStop(0,'rgba(255,236,170,0.10)');
      g.addColorStop(1,'rgba(255,236,170,0)');
      X.fillStyle=g; X.fillRect(L.x-cx-200, L.y-cy, 400, 360);
      X.fillStyle='#2a2d33'; X.fillRect(L.x-cx-26, L.y-cy, 52, 14);
      X.fillStyle='#ffe9a8'; X.fillRect(L.x-cx-22, L.y-cy+2, 44, 6);
    }
  }
  if (layer==='objects'){
    for (const p of d.pallets){
      X.save(); X.translate(p.x-cx, p.y-cy); X.rotate(p.ang);
      const layers = p.stack || 1;
      for (let s=0; s<layers; s++){
        const off = -s*4;
        X.fillStyle='rgba(10,12,16,0.3)'; X.fillRect(-32+3, -22+3+off, 64, 44);
        X.fillStyle='#6b4e26'; X.fillRect(-32,-22+off,64,44);
        X.fillStyle='rgba(0,0,0,0.3)'; X.fillRect(-32,-22+off,64,4); X.fillRect(-32, 18+off,64,4);
        X.strokeStyle='#3a2a18'; X.lineWidth=1;
        for (let i=-22;i<=22;i+=6){ X.beginPath(); X.moveTo(-32,i+off); X.lineTo(32,i+off); X.stroke(); }
      }
      X.restore();
    }
    for (const dr of d.drums){
      if (dr.tipped){
        X.fillStyle='rgba(10,12,16,0.4)'; X.fillRect(dr.x-cx-22, dr.y-cy+10, 44, 8);
        X.fillStyle=dr.c; X.fillRect(dr.x-cx-22, dr.y-cy-8, 44, 18);
        X.fillStyle='rgba(255,255,255,0.12)'; X.fillRect(dr.x-cx-22, dr.y-cy-8, 44, 3);
        X.fillStyle='rgba(0,0,0,0.45)'; X.fillRect(dr.x-cx-22, dr.y-cy+7, 44, 3);
        X.fillStyle=dr.c;
        X.beginPath(); X.ellipse(dr.x-cx-22, dr.y-cy+1, 4, 9, 0, 0, Math.PI*2); X.fill();
        X.beginPath(); X.ellipse(dr.x-cx+22, dr.y-cy+1, 4, 9, 0, 0, Math.PI*2); X.fill();
        X.strokeStyle='#23262c'; X.strokeRect(dr.x-cx-22, dr.y-cy-8, 44, 18);
        X.fillStyle='rgba(60,40,20,0.4)';
        X.beginPath(); X.ellipse(dr.x-cx+30, dr.y-cy+4, 14, 7, 0, 0, Math.PI*2); X.fill();
      } else {
        X.fillStyle='rgba(10,12,16,0.4)';
        X.beginPath(); X.ellipse(dr.x-cx+3, dr.y-cy+3, 17,12,0,0,Math.PI*2); X.fill();
        X.fillStyle=dr.c; X.beginPath();
        X.ellipse(dr.x-cx, dr.y-cy, 17,12,0,0,Math.PI*2); X.fill();
        X.fillStyle='rgba(255,255,255,0.12)';
        X.beginPath(); X.ellipse(dr.x-cx, dr.y-cy-2, 17,12,0,Math.PI,Math.PI*2); X.fill();
        X.strokeStyle='#23262c'; X.lineWidth=1.5;
        X.beginPath(); X.ellipse(dr.x-cx, dr.y-cy, 17,12,0,0,Math.PI*2); X.stroke();
        X.fillStyle='rgba(220,220,220,0.18)'; X.fillRect(dr.x-cx-10, dr.y-cy-1, 20,2);
      }
    }
    const f=d.forklift;
    X.save(); X.translate(f.x-cx, f.y-cy); X.rotate(f.ang);
    X.fillStyle='rgba(10,12,16,0.35)'; X.fillRect(-30+5, -20+5, 60, 50);
    X.fillStyle='#b07820'; X.fillRect(-30,-20,60,50);
    X.fillStyle='rgba(255,255,255,0.12)'; X.fillRect(-30,-20,60,4);
    X.fillStyle='rgba(0,0,0,0.35)'; X.fillRect(-30,26,60,4);
    X.strokeStyle='#2a1c08'; X.lineWidth=2; X.strokeRect(-30,-20,60,50);
    X.fillStyle='#2a2d33'; X.fillRect(-14,-12,28,20);
    X.fillStyle='#7fb8d8'; X.fillRect(-12,-10,24,4);
    X.fillStyle='#3a3a3a'; X.fillRect(-10,-32,4,16); X.fillRect(6,-32,4,16);
    X.restore();
    if (d.cart){
      const c=d.cart;
      X.save(); X.translate(c.x-cx, c.y-cy); X.rotate(c.ang);
      X.fillStyle='rgba(10,12,16,0.35)'; X.fillRect(-22+3, -16+3, 44, 32);
      X.fillStyle='#4a4f57'; X.fillRect(-22, -16, 44, 32);
      X.fillStyle='rgba(255,255,255,0.10)'; X.fillRect(-22, -16, 44, 3);
      X.strokeStyle='#23262c'; X.strokeRect(-22, -16, 44, 32);
      X.fillStyle='#1c1f24';
      X.beginPath(); X.arc(-18,-14,4,0,Math.PI*2); X.fill();
      X.beginPath(); X.arc( 18,-14,4,0,Math.PI*2); X.fill();
      X.beginPath(); X.arc(-18, 14,4,0,Math.PI*2); X.fill();
      X.beginPath(); X.arc( 18, 14,4,0,Math.PI*2); X.fill();
      X.strokeStyle='#5a5f67'; X.lineWidth=3;
      X.beginPath(); X.moveTo(22,-8); X.lineTo(34,-8); X.stroke();
      X.restore();
    }
  }
}

function a1DrawTop(dt){
  const a=ACT1,p=a.p,cx=a.cam.x,cy=a.cam.y,t=a.totalT;

  X.fillStyle='#828790'; X.fillRect(0,0,W,H);
  X.fillStyle='#787d86';
  for (let gy=-(cy%96); gy<H; gy+=96)
    for (let gx=-(cx%96); gx<W; gx+=96)
      if (((Math.floor((gx+cx)/96)+Math.floor((gy+cy)/96))&1)) X.fillRect(gx,gy,96,96);
  X.strokeStyle='rgba(20,24,28,0.30)'; X.lineWidth=1;
  for (let gx=-(cx%96); gx<W; gx+=96){ X.beginPath(); X.moveTo(gx,0); X.lineTo(gx,H); X.stroke(); }
  for (let gy=-(cy%96); gy<H; gy+=96){ X.beginPath(); X.moveTo(0,gy); X.lineTo(W,gy); X.stroke(); }
  for (let i=0;i<60;i++){
    const nx=((i*977)%W), ny=((i*617)%H);
    X.fillStyle='rgba(20,24,28,0.06)'; X.fillRect(nx,ny,2,2);
  }

  a1DrawDecor(cx,cy,'floor',t);

  X.fillStyle='#3a3f47';
  X.fillRect(BAY.x0-30-cx,BAY.y0-30-cy,(BAY.x1-BAY.x0)+60,12);
  X.fillRect(BAY.x0-30-cx,BAY.y1+18-cy,(BAY.x1-BAY.x0)+60,12);
  X.fillRect(BAY.x0-30-cx,BAY.y0-30-cy,12,(BAY.y1-BAY.y0)+60);
  X.fillRect(BAY.x1+18-cx,BAY.y0-30-cy,12,(BAY.y1-BAY.y0)+60);
  X.strokeStyle='#1d2025'; X.lineWidth=2;
  X.strokeRect(BAY.x0-30-cx,BAY.y0-30-cy,(BAY.x1-BAY.x0)+60,(BAY.y1-BAY.y0)+60);
  X.fillStyle='#2a2d33';
  for (let wx=BAY.x0; wx<BAY.x1; wx+=200){
    X.fillRect(wx-cx-2, BAY.y0-30-cy, 4, 12);
    X.fillRect(wx-cx-2, BAY.y1+18-cy, 4, 12);
  }
  for (let wy=BAY.y0; wy<BAY.y1; wy+=200){
    X.fillRect(BAY.x0-30-cx, wy-cy-2, 12, 4);
    X.fillRect(BAY.x1+18-cx, wy-cy-2, 12, 4);
  }

  a1DrawDecor(cx,cy,'wall',t);

  X.fillStyle='#56606a'; X.fillRect(BAY.x0-30-cx, ACT1_H-260-cy, 14,160);
  X.fillStyle='#23262c'; X.fillRect(BAY.x0-30-cx, ACT1_H-260-cy, 14, 6);
  X.fillStyle='#3a3f47'; X.font='bold 10px Courier New'; X.textAlign='center';
  X.save(); X.translate(BAY.x0-44-cx, ACT1_H-180-cy); X.rotate(-Math.PI/2);
  X.fillText('CHAMBER',0,0); X.restore();

  const ed=a.exitDoor;
  const open = a1TipPhase()>0.95;
  for (let i=0;i<10;i++){
    X.fillStyle=(i%2)?'#1f1f22':'#e8c33a';
    X.fillRect(ed.x-cx, ed.y-cy + i*20, 14, 20);
  }
  X.fillStyle=open?'#3fae6f':'#5a5f67';
  X.fillRect(ed.x-cx, ed.y-cy, 14, ed.d);
  X.strokeStyle='#1d2025'; X.lineWidth=2;
  X.strokeRect(ed.x-cx, ed.y-cy, 14, ed.d);
  X.fillStyle=open?'#5dd6a8':'#3a3f47'; X.font='bold 10px Courier New'; X.textAlign='center';

function a1Crate(sx,sy,w,d,tone,tag,isTarget,lid){
  X.fillStyle=tone; X.fillRect(sx,sy,w,d);
  for (let i=0;i<14;i++){
    const nx=sx+((i*131)%w), ny=sy+((i*97)%d);
    X.fillStyle='rgba(255,255,255,0.05)'; X.fillRect(nx,ny,2,2);
    X.fillStyle='rgba(0,0,0,0.10)'; X.fillRect(sx+((i*199)%w), sy+((i*223)%d), 2,2);
  }
  X.fillStyle='rgba(255,255,255,0.10)'; X.fillRect(sx,sy,w,4); X.fillRect(sx,sy,4,d);
  X.fillStyle='rgba(0,0,0,0.36)'; X.fillRect(sx,sy+d-5,w,5); X.fillRect(sx+w-5,sy,5,d);
  X.strokeStyle='rgba(0,0,0,0.55)'; X.lineWidth=1.5; X.strokeRect(sx,sy,w,d);
  X.fillStyle='rgba(0,0,0,0.4)';
  for (const [rx,ry] of [[6,6],[w-9,6],[6,d-9],[w-9,d-9]]){
    X.fillRect(sx+rx,sy+ry,3,3);
  }
  if (isTarget && lid>0){
    X.fillStyle='#15171b'; X.fillRect(sx+6,sy+6,w-12,d-12);
    X.fillStyle='#26415a'; X.fillRect(sx+w/2-16,sy+d/2-16,32,32);
    X.fillStyle='#3a608a'; X.fillRect(sx+w/2-12,sy+d/2-12,24,24);
    X.fillStyle='#7fb8d8'; X.fillRect(sx+w/2-4,sy+d/2-4,8,8);
    const half=(w-12)/2, slide=lid*(half+6);
    X.fillStyle=tone;
    X.fillRect(sx+6-slide, sy+6, half, d-12);
    X.fillRect(sx+6+half+slide, sy+6, half, d-12);
    X.fillStyle='rgba(0,0,0,0.4)';
    X.fillRect(sx+6-slide+half-3, sy+6, 3, d-12);
    X.fillRect(sx+6+half+slide, sy+6, 3, d-12);
  } else {
    X.strokeStyle='rgba(0,0,0,0.28)'; X.lineWidth=3;
    X.beginPath(); X.moveTo(sx,sy+d*0.34); X.lineTo(sx+w,sy+d*0.34); X.stroke();
    X.beginPath(); X.moveTo(sx+w*0.5,sy); X.lineTo(sx+w*0.5,sy+d); X.stroke();
    if (tag){ X.fillStyle='rgba(210,214,220,0.4)'; X.font='bold 12px Courier New';
      X.textAlign='center'; X.fillText(tag, sx+w/2, sy+d/2+4); }
  }
}

function initBriefing(){
  G.state = 'briefing';
  BRIEF.t = 0;
  BRIEF.phase = 'enter';
  BRIEF.player = { x:80, y:0, vx:0, walk:0, facing:1 };
  BRIEF.cam = 0;
  BRIEF.started = false;
  BRIEF.monitorOn = false;
  BRIEF.subIdx = -1;
  BRIEF.subT = 0;
}

function updateBriefing(dt){
  const b = BRIEF;
  b.t += dt;
  let mx = 0;
  if (b.phase !== 'enter-cinematic'){
    if (keys['a']||keys['arrowleft']) mx -= 1;
    if (keys['d']||keys['arrowright']) mx += 1;
  }
  const SPD = 200;
  b.player.vx = mx * SPD;
  if (mx){ b.player.facing = mx; b.player.walk += dt*8; }
  b.player.x += b.player.vx * dt;
  b.player.x = clamp(b.player.x, 60, b.hallW - 60);

  let camTarget = clamp(b.player.x - W/2, 0, b.hallW - W);
  b.cam = lerp(b.cam, camTarget, 0.12);

  if (b.phase === 'enter'){
    if (b.player.x > 240){
      b.phase = 'playing';
      b.monitorOn = true;
      playSfx('door', { volume:0.5 });
      BRIEF.started = true;
    }
  }

  if (b.phase === 'playing'){
    b.subT += dt;
    const trackTime = b.subT;
    let idx = -1;
    for (let i = 0; i < b.subs.length; i++){
      if (trackTime >= b.subs[i].t) idx = i;
    }
    b.subIdx = idx;
    const lastLineEnd = b.subs[b.subs.length-1].t + 4;
    if (trackTime > lastLineEnd){
      b.phase = 'done';
      playSfx('beep', { freq:520, volume:0.4 });
    }
  }

  if (b.phase === 'done'){
    if (b.player.x > b.hallW - 80){
      initAct2();
      return;
    }
  }
}

// --- THE GRABBY SILHOUETTE (Greensboro DNR style) ---
function drawDNRGrabby(gx, gy, scale, headTilt){
  const s = scale;
  X.save();
  X.translate(gx, gy);
  X.fillStyle = '#000000';

  // ============ LEGS / FEET ============
  for (let f=0; f<5; f++){
    const ang = (f-2) * 0.32;
    const len = (28 + Math.abs(f-2)*4) * s;
    const baseX = -10*s;
    const baseY = 0;
    const tipX = baseX + Math.sin(ang) * len;
    const tipY = baseY + Math.cos(ang) * len * 0.35;
    X.beginPath();
    const wBase = 2.4*s, wTip = 0.5*s;
    const perpX = Math.cos(ang) * wBase;
    const perpY = -Math.sin(ang) * wBase;
    const tPerpX = Math.cos(ang) * wTip;
    const tPerpY = -Math.sin(ang) * wTip;
    X.moveTo(baseX - perpX, baseY - perpY);
    X.lineTo(baseX + perpX, baseY + perpY);
    X.lineTo(tipX + tPerpX, tipY + tPerpY);
    X.lineTo(tipX - tPerpX, tipY - tPerpY);
    X.closePath(); X.fill();
  }
  for (let f=0; f<5; f++){
    const ang = (f-2) * 0.32;
    const len = (28 + Math.abs(f-2)*4) * s;
    const baseX = 10*s;
    const baseY = 0;
    const tipX = baseX + Math.sin(ang) * len;
    const tipY = baseY + Math.cos(ang) * len * 0.35;
    X.beginPath();
    const wBase = 2.4*s, wTip = 0.5*s;
    const perpX = Math.cos(ang) * wBase;
    const perpY = -Math.sin(ang) * wBase;
    const tPerpX = Math.cos(ang) * wTip;
    const tPerpY = -Math.sin(ang) * wTip;
    X.moveTo(baseX - perpX, baseY - perpY);
    X.lineTo(baseX + perpX, baseY + perpY);
    X.lineTo(tipX + tPerpX, tipY + tPerpY);
    X.lineTo(tipX - tPerpX, tipY - tPerpY);
    X.closePath(); X.fill();
  }
  X.beginPath();
  X.moveTo(-12*s, 0);
  X.lineTo(-8*s, 0);
  X.bezierCurveTo(-6*s, -30*s, -7*s, -60*s, -8*s, -95*s);
  X.lineTo(-12*s, -95*s);
  X.bezierCurveTo(-13*s, -60*s, -14*s, -30*s, -12*s, 0);
  X.closePath(); X.fill();
  X.beginPath();
  X.moveTo(8*s, 0);
  X.lineTo(12*s, 0);
  X.bezierCurveTo(14*s, -30*s, 13*s, -60*s, 12*s, -95*s);
  X.lineTo(8*s, -95*s);
  X.bezierCurveTo(7*s, -60*s, 6*s, -30*s, 8*s, 0);
  X.closePath(); X.fill();

  // ============ TORSO ============
  X.beginPath();
  X.moveTo(-12*s, -95*s);
  X.bezierCurveTo(-14*s, -110*s, -16*s, -125*s, -15*s, -140*s);
  X.bezierCurveTo(-14*s, -148*s, -10*s, -152*s, -5*s, -154*s);
  X.bezierCurveTo(-2*s, -155*s, 2*s, -155*s, 5*s, -154*s);
  X.bezierCurveTo(10*s, -152*s, 14*s, -147*s, 15*s, -140*s);
  X.bezierCurveTo(16*s, -125*s, 14*s, -110*s, 12*s, -95*s);
  X.closePath(); X.fill();

  // ============ ARMS ============
  function drawArm(shoulderX, shoulderY, armLen, sideSign, extraOut, splay){
    const elbowX = shoulderX + sideSign * (10 + extraOut) * s;
    const elbowY = shoulderY + armLen * 0.45;
    const wristX = shoulderX + sideSign * (7 + extraOut*0.4) * s;
    const wristY = shoulderY + armLen * 0.95;
    const wShoulder = 3.2*s;
    const wElbow = 2.4*s;
    const wWrist = 1.8*s;

    X.beginPath();
    X.moveTo(shoulderX + sideSign*wShoulder, shoulderY);
    X.bezierCurveTo(
      shoulderX + sideSign*(wShoulder + 4*s), shoulderY + armLen*0.18,
      elbowX + sideSign*wElbow + sideSign*2*s, elbowY - armLen*0.05,
      elbowX + sideSign*wElbow, elbowY
    );
    X.bezierCurveTo(
      elbowX + sideSign*wElbow*0.5, elbowY + armLen*0.18,
      wristX + sideSign*wWrist + sideSign*1*s, wristY - armLen*0.05,
      wristX + sideSign*wWrist, wristY
    );
    X.lineTo(wristX - sideSign*wWrist, wristY);
    X.bezierCurveTo(
      wristX - sideSign*wWrist*0.5, wristY - armLen*0.05,
      elbowX - sideSign*wElbow*0.5, elbowY + armLen*0.18,
      elbowX - sideSign*wElbow, elbowY
    );
    X.bezierCurveTo(
      elbowX - sideSign*wElbow*0.5, elbowY - armLen*0.05,
      shoulderX - sideSign*(wShoulder*0.2), shoulderY + armLen*0.18,
      shoulderX - sideSign*wShoulder, shoulderY
    );
    X.closePath(); X.fill();

    for (let f=0; f<5; f++){
      const ang = (f-2) * 0.16 * splay;
      const len = (22 + Math.abs(f-2)*3) * s;
      const tipX = wristX + Math.sin(ang) * len + sideSign * 0.6*s;
      const tipY = wristY + Math.cos(ang) * len;
      X.beginPath();
      const wBase = 1.6*s, wTip = 0.4*s;
      const perpX = Math.cos(ang) * wBase;
      const perpY = -Math.sin(ang) * wBase;
      const tPerpX = Math.cos(ang) * wTip;
      const tPerpY = -Math.sin(ang) * wTip;
      X.moveTo(wristX - perpX, wristY - perpY);
      X.lineTo(wristX + perpX, wristY + perpY);
      X.lineTo(tipX + tPerpX, tipY + tPerpY);
      X.lineTo(tipX - tPerpX, tipY - tPerpY);
      X.closePath(); X.fill();
    }
  }

  drawArm(-14*s, -148*s, 145*s, -1, 4, 1.0);
  drawArm( 14*s, -148*s, 145*s,  1, 4, 1.0);
  drawArm(-15*s, -128*s, 130*s, -1, 1, 1.3);
  drawArm( 15*s, -128*s, 130*s,  1, 1, 1.3);

  // ============ HEAD ============
  X.save();
  X.translate(0, -163*s);
  X.rotate(headTilt * 0.5);
  X.beginPath();
  X.ellipse(0, 0, 7*s, 9*s, 0, 0, Math.PI*2);
  X.fill();
  X.beginPath();
  X.moveTo(-2.5*s, 7*s);
  X.lineTo(2.5*s, 7*s);
  X.lineTo(3.5*s, 12*s);
  X.lineTo(-3.5*s, 12*s);
  X.closePath(); X.fill();
  // two red eyes, no mouth — slit pupils, faint bleed (alien, dead)
  for (const ex of [-3*s, 3*s]){
    X.fillStyle = 'rgba(200,30,20,0.30)';
    X.beginPath(); X.arc(ex, -1*s, 2.6*s, 0, Math.PI*2); X.fill();
    X.fillStyle = '#c01810';
    X.beginPath(); X.ellipse(ex, -1*s, 1.5*s, 2.0*s, 0, 0, Math.PI*2); X.fill();
    X.fillStyle = '#ff5040';
    X.beginPath(); X.ellipse(ex, -1.4*s, 0.6*s, 1.0*s, 0, 0, Math.PI*2); X.fill();
  }
  X.restore();

  X.restore();
}

// Seeded pseudo-random (deterministic per index)
function _seedRand(seed){
  let s = (seed*9301 + 49297) % 233280;
  return s / 233280;
}

// HALLWAY DAMAGE  —  80s slasher / Poppy Playtime crime scene
// =========================================================
function drawHallwayDamage(cam){
  const dmgX0 = 1050, dmgX1 = 1450;
  if ((dmgX1 - cam) < -50 || (dmgX0 - cam) > W+50) return;
  const wcx = (dmgX0 + dmgX1) / 2;
  const t = BRIEF.t;

  X.save();
  X.translate(-cam, 0);

  const flickerSeed = Math.floor(t*14);
  const flickerNoise = _seedRand(flickerSeed);
  const lightOn = flickerNoise > 0.35;
  const lightAmt = lightOn ? (0.7 + _seedRand(flickerSeed+1)*0.3) : 0.05;

  X.fillStyle = '#1a1a1c'; X.fillRect(wcx-90, 62, 180, 10);
  X.fillStyle = '#221a18'; X.fillRect(wcx-86, 64, 176, 4);
  if (lightOn){
    X.fillStyle = `rgba(255,220,160,${0.45+lightAmt*0.4})`;
    X.fillRect(wcx-86, 64, 90, 4);
    X.fillStyle = '#0a0608'; X.fillRect(wcx-4, 64, 6, 4);
    const cone = X.createRadialGradient(wcx-30, 70, 10, wcx-30, 380, 320);
    cone.addColorStop(0, `rgba(255,200,120,${0.18*lightAmt})`);
    cone.addColorStop(0.6, `rgba(255,160,100,${0.08*lightAmt})`);
    cone.addColorStop(1, 'rgba(255,140,80,0)');
    X.fillStyle = cone;
    X.beginPath();
    X.moveTo(wcx-70, 72); X.lineTo(wcx+20, 72);
    X.lineTo(wcx+200, H); X.lineTo(wcx-220, H); X.closePath(); X.fill();
  }
  const moodAlpha = lightOn ? 0.10 : 0.28;
  const mood = X.createLinearGradient(0, 80, 0, H);
  mood.addColorStop(0, `rgba(60,8,12,${moodAlpha})`);
  mood.addColorStop(0.5, `rgba(40,6,10,${moodAlpha*0.7})`);
  mood.addColorStop(1, `rgba(20,4,6,${moodAlpha*0.4})`);
  X.fillStyle = mood;
  X.fillRect(dmgX0-60, 80, (dmgX1-dmgX0)+120, H-80);

  X.fillStyle = '#06080a';
  X.beginPath();
  X.moveTo(dmgX0+10, 132);
  const topSteps = 22;
  for (let i=1; i<=topSteps; i++){
    const px = dmgX0+10 + (i/topSteps) * (dmgX1-dmgX0-20);
    const ny = 132 + (_seedRand(i*13+7)*2 - 1) * 8;
    X.lineTo(px, ny);
  }
  X.lineTo(dmgX1-10 + _seedRand(99)*6, 220);
  X.lineTo(dmgX1-30, 300);
  X.lineTo(dmgX1-6, 400);
  X.lineTo(dmgX1-14, 450);
  const botSteps = 18;
  for (let i=1; i<=botSteps; i++){
    const px = dmgX1-14 - (i/botSteps) * (dmgX1-dmgX0-24);
    const ny = 450 + (_seedRand(i*11+31)*2 - 1) * 7;
    X.lineTo(px, ny);
  }
  X.lineTo(dmgX0+18, 380);
  X.lineTo(dmgX0-2, 290);
  X.lineTo(dmgX0+20, 200);
  X.lineTo(dmgX0+10, 132);
  X.closePath();
  X.fill();
  X.strokeStyle = '#3a1810'; X.lineWidth = 2; X.stroke();

  X.strokeStyle = '#181a1e'; X.lineWidth = 2;
  for (let i=0;i<6;i++){
    const stx = dmgX0 + 40 + i*60;
    if (stx > dmgX1-20) break;
    X.beginPath();
    X.moveTo(stx, 160);
    X.lineTo(stx + _seedRand(i+1)*4 - 2, 430);
    X.stroke();
  }
  for (let i=0;i<6;i++){
    const wx = dmgX0 + 55 + i*60;
    if (wx > dmgX1-25) break;
    const swing = Math.sin(t*0.8 + i*1.7) * 3;
    X.strokeStyle = '#4a1612'; X.lineWidth = 2;
    X.beginPath();
    X.moveTo(wx, 160);
    X.bezierCurveTo(wx+6+swing, 200, wx-8+swing, 240, wx+4+swing, 280);
    X.stroke();
    X.fillStyle = '#7a1a14'; X.fillRect(wx+3+swing, 278, 3, 4);
    X.fillStyle = '#a02018'; X.fillRect(wx+3+swing, 281, 2, 2);
  }
  for (let i=0;i<4;i++){
    const sphase = (t*2 + i*0.7) % 1;
    if (sphase < 0.15){
      const sxs = dmgX0 + 70 + i*90;
      if (sxs > dmgX1-30) continue;
      X.fillStyle = `rgba(255,200,100,${1-sphase*6})`;
      X.fillRect(sxs, 260 + i*12 + sphase*40, 2, 2);
      X.fillRect(sxs+1, 262 + i*12 + sphase*40, 1, 1);
    }
  }

  function clawSet(originX, originY, length, angle, darkOnLight, seedKey){
    const count = 4 + Math.floor(_seedRand(seedKey*3 + 11)*2);
    const spacing = 5 + _seedRand(seedKey*3 + 12)*3;
    for (let i=0;i<count;i++){
      const off = (i - (count-1)/2) * spacing;
      const perpX = -Math.sin(angle) * off;
      const perpY = Math.cos(angle) * off;
      const x0 = originX + perpX;
      const y0 = originY + perpY;
      const taper = 0.7 + _seedRand(seedKey*5 + i)*0.5;
      const x1t = x0 + Math.cos(angle) * length * taper;
      const y1t = y0 + Math.sin(angle) * length * taper;
      if (darkOnLight){
        X.strokeStyle = 'rgba(255,255,255,0.10)'; X.lineWidth = 2;
        X.beginPath(); X.moveTo(x0+1, y0+1); X.lineTo(x1t+1, y1t+1); X.stroke();
        X.strokeStyle = '#0c0f14'; X.lineWidth = 1.5;
        X.beginPath(); X.moveTo(x0, y0); X.lineTo(x1t, y1t); X.stroke();
      } else {
        X.strokeStyle = 'rgba(200,210,220,0.45)'; X.lineWidth = 1.5;
        X.beginPath(); X.moveTo(x0, y0); X.lineTo(x1t, y1t); X.stroke();
      }
    }
  }
  clawSet(dmgX0+80,  180, 200, 0.45, false, 1);
  clawSet(dmgX0+150, 240, 230, 0.55, false, 2);
  clawSet(dmgX0+90,  340, 260, 0.25, false, 3);
  clawSet(dmgX0+180, 400, 180, -0.10, false, 4);
  clawSet(dmgX0+260, 200, 160, 0.70, false, 5);
  clawSet(dmgX0-20,  220, 110, 0.40, true, 6);
  clawSet(dmgX0-40,  340, 130, 0.20, true, 7);
  clawSet(dmgX1-30,  260, 120, 0.55, true, 8);
  clawSet(dmgX1+20,  380, 100, 0.30, true, 9);
  clawSet(dmgX1+60,  300, 200, 0.05, true, 10);

  for (let i=0;i<14;i++){
    const gx = dmgX0 - 80 + Math.random() * ((dmgX1-dmgX0)+160);
    const gy = 90 + Math.random() * (H-100);
    const ga = 0.03 + Math.random()*0.05;
    X.fillStyle = `rgba(220,210,200,${ga})`;
    X.fillRect(gx, gy, 1, 1);
  }

  X.restore();
}

function initAct2(){
  const r = TROPHY;
  r.t = 0;
  r.cam.x = 0; r.cam.y = 0;
  r.player.x = 120; r.player.y = TROPHY_ROOM_H/2;
  r.player.vx=0; r.player.vy=0; r.player.walk=0; r.player.facing=0;
  r.player.knockback=0; r.player.brickHeld = 0;
  r.grabby.x = TROPHY_ROOM_W - 250; r.grabby.y = TROPHY_ROOM_H/2;
  r.grabby.vx=0; r.grabby.vy=0; r.grabby.walk=0;
  r.grabby.hp = 15000; r.grabby.dmgDealt = 0;
  r.grabby.state='hunt'; r.grabby.stateT=0; r.grabby.flashT=0;
  r.grabby.stunDur = 0; r.grabby.target = null;
  r.grabby.knowsPlayer = false;
  r.grabby.lastSeenX = r.player.x; r.grabby.lastSeenY = r.player.y;
  r.grabby.searchT = 0; r.grabby.losMemoryT = 0;
  r.grabby._patrolX = 0;
  r.ally.lion = null; r.ally.bear = null;
  r.bricks = [];
  r.particles = [];
  r._heartT = 0;
  r.grabby._wasKnown = false;
  r.prompt = ''; r.promptIdx=-1; r.holdT = 0;
  r.exitOpen = false; r.exitFlashT = 0;
  r.hint = 'Hold E to push trophies. Click to throw bricks. Deal 4000 dmg.';
  r.hintT = 8;
  for (const t of r.trophies){
    t.used = false;
    t.progress = 0;
    t.slamHits = 0;
    t.toppleT = 0;
    t.toppled = false;
    if (t.id==='bricks'){ t.bricksLeft = 10; t.firstGrab = true; }
  }
  G.state = 'act2';
}

function _circleCollideTrophies(px, py, pr){
  const r = TROPHY;
  let nx = px, ny = py;
  for (const t of r.trophies){
    if (t.toppled || t.used) continue;
    const blockR = t.size * 0.7;
    const dx = nx - t.x, dy = ny - t.y;
    const d2 = dx*dx + dy*dy;
    const minD = blockR + pr;
    if (d2 < minD*minD && d2 > 0.0001){
      const d = Math.sqrt(d2);
      const push = minD - d;
      nx += dx/d * push; ny += dy/d * push;
    }
  }
  for (const c of r.cover){
    const cx0 = c.x, cy0 = c.y;
    const cx1 = c.x + c.w, cy1 = c.y + c.h;
    const closestX = clamp(nx, cx0, cx1);
    const closestY = clamp(ny, cy0, cy1);
    const dx = nx - closestX, dy = ny - closestY;
    const d2 = dx*dx + dy*dy;
    if (d2 < pr*pr && d2 > 0.0001){
      const d = Math.sqrt(d2);
      nx += dx/d * (pr - d);
      ny += dy/d * (pr - d);
    } else if (d2 < 0.0001){
      const dxL = nx - cx0, dxR = cx1 - nx;
      const dyT = ny - cy0, dyB = cy1 - ny;
      const m = Math.min(dxL, dxR, dyT, dyB);
      if (m === dxL) nx = cx0 - pr - 0.5;
      else if (m === dxR) nx = cx1 + pr + 0.5;
      else if (m === dyT) ny = cy0 - pr - 0.5;
      else ny = cy1 + pr + 0.5;
    }
  }
  return { x: nx, y: ny };
}

function _hasLOS(ax, ay, bx, by){
  const r = TROPHY;
  for (const c of r.cover){
    if (c.kind !== 'big') continue;
    if (_segHitsRect(ax, ay, bx, by, c.x, c.y, c.w, c.h)) return false;
  }
  for (const t of r.trophies){
    if (t.toppled || t.used) continue;
    const s = t.size * 0.7;
    if (_segHitsRect(ax, ay, bx, by, t.x - s, t.y - s, s*2, s*2)) return false;
  }
  return true;
}

function _segHitsRect(ax, ay, bx, by, rx, ry, rw, rh){
  const x0 = rx, y0 = ry, x1 = rx + rw, y1 = ry + rh;
  const dx = bx - ax, dy = by - ay;
  let p = [-dx, dx, -dy, dy];
  let q = [ax - x0, x1 - ax, ay - y0, y1 - ay];
  let t0 = 0, t1 = 1;
  for (let i = 0; i < 4; i++){
    if (Math.abs(p[i]) < 1e-9){
      if (q[i] < 0) return false;
      continue;
    }
    const t = q[i] / p[i];
    if (p[i] < 0){
      if (t > t1) return false;
      if (t > t0) t0 = t;
    } else {
      if (t < t0) return false;
      if (t < t1) t1 = t;
    }
  }
  return t1 >= t0 && t1 >= 0 && t0 <= 1;
}

// ---- Act 2 particles (dust, impact sparks, debris) ----
function a2Spawn(x, y, n, opts){
  const r = TROPHY;
  if (!r.particles) r.particles = [];
  opts = opts || {};
  for (let i = 0; i < n; i++){
    const ang = opts.ang != null ? opts.ang + rand(-0.6,0.6) : rand(0, Math.PI*2);
    const spd = rand(opts.spdMin||40, opts.spdMax||180);
    r.particles.push({
      x, y,
      vx: Math.cos(ang)*spd,
      vy: Math.sin(ang)*spd,
      life: 0,
      maxLife: rand(opts.lifeMin||0.4, opts.lifeMax||0.9),
      size: rand(opts.sizeMin||2, opts.sizeMax||5),
      color: opts.color || '#6a6258',
      drag: opts.drag != null ? opts.drag : 2.2,
    });
  }
}
function a2UpdateParticles(dt){
  const r = TROPHY;
  if (!r.particles) return;
  for (let i = r.particles.length-1; i >= 0; i--){
    const p = r.particles[i];
    p.life += dt;
    if (p.life >= p.maxLife){ r.particles.splice(i,1); continue; }
    const d = Math.exp(-p.drag*dt);
    p.vx *= d; p.vy *= d;
    p.x += p.vx*dt; p.y += p.vy*dt;
  }
}
function a2DrawParticles(cam){
  const r = TROPHY;
  if (!r.particles) return;
  for (const p of r.particles){
    const a = 1 - (p.life/p.maxLife);
    X.globalAlpha = a*a;
    X.fillStyle = p.color;
    const s = p.size * (0.5 + a*0.5);
    X.fillRect(p.x - cam.x - s/2, p.y - cam.y - s/2, s, s);
  }
  X.globalAlpha = 1;
}

function updateAct2(dt){
  const r = TROPHY;
  r.t += dt;
  if (r.hintT > 0) r.hintT -= dt;
  if (!r.particles) r.particles = [];
  if (r._heartT === undefined) r._heartT = 0;
  a2UpdateParticles(dt);

  // ---- proximity dread: heartbeat that quickens as the grabby nears ----
  {
    const g = r.grabby;
    const d = Math.hypot(g.x - r.player.x, g.y - r.player.y);
    if (g.state !== 'retreat' && d < 360){
      const closeness = clamp(1 - d/360, 0, 1);
      r._heartT -= dt;
      if (r._heartT <= 0){
        r._heartT = lerp(1.1, 0.34, closeness);
        const vol = lerp(0.12, 0.4, closeness) * (g.knowsPlayer ? 1.3 : 1);
        playSfx('thud', { freq: 58, volume: vol });
      }
    } else {
      r._heartT = 0;
    }
  }

  const wmx = mouse.x + r.cam.x;
  const wmy = mouse.y + r.cam.y;
  r.player.facing = Math.atan2(wmy - r.player.y, wmx - r.player.x);

  if (mouse.justDown && r.player.brickHeld > 0){
    mouse.justDown = false;
    const speed = 600;
    r.bricks.push({
      x: r.player.x + Math.cos(r.player.facing)*22,
      y: r.player.y + Math.sin(r.player.facing)*22,
      vx: Math.cos(r.player.facing)*speed,
      vy: Math.sin(r.player.facing)*speed,
      t: 0,
    });
    r.player.brickHeld--;
    playSfx('thud', { freq:300, volume:0.4 });
  }

  let mvx = 0, mvy = 0;
  if (r.player.knockback > 0){
    r.player.knockback -= dt;
  } else {
    if (keys['a']||keys['arrowleft'])  mvx -= 1;
    if (keys['d']||keys['arrowright']) mvx += 1;
    if (keys['w']||keys['arrowup'])    mvy -= 1;
    if (keys['s']||keys['arrowdown'])  mvy += 1;
  }
  const moving = (mvx || mvy);
  if (moving){
    const n = Math.hypot(mvx, mvy); mvx /= n; mvy /= n;
    r.player.walk += dt * 8;
  }
  const SPD = 240;
  r.player.vx = mvx * SPD;
  r.player.vy = mvy * SPD;
  let nx = r.player.x + r.player.vx * dt;
  let ny = r.player.y + r.player.vy * dt;
  nx = clamp(nx, 60, TROPHY_ROOM_W - 60);
  ny = clamp(ny, 60, TROPHY_ROOM_H - 60);
  const resolved = _circleCollideTrophies(nx, ny, r.player.radius);
  r.player.x = clamp(resolved.x, 60, TROPHY_ROOM_W - 60);
  r.player.y = clamp(resolved.y, 60, TROPHY_ROOM_H - 60);

  const camTX = clamp(r.player.x - W/2, 0, TROPHY_ROOM_W - W);
  const camTY = clamp(r.player.y - H/2, 0, TROPHY_ROOM_H - H);
  r.cam.x = lerp(r.cam.x, camTX, 0.12);
  r.cam.y = lerp(r.cam.y, camTY, 0.12);

  let prevIdx = r.promptIdx;
  r.prompt = ''; r.promptIdx = -1;
  let bestD2 = 110*110;
  for (let i=0; i<r.trophies.length; i++){
    const tr = r.trophies[i];
    if (tr.used && tr.id !== 'bricks') continue;
    if (tr.id === 'bricks' && tr.bricksLeft <= 0) continue;
    const dx = tr.x - r.player.x, dy = tr.y - r.player.y;
    const d2 = dx*dx + dy*dy;
    if (d2 < bestD2){ bestD2 = d2; r.promptIdx = i; }
  }
  if (r.promptIdx !== prevIdx){ r.holdT = 0; }

  if (r.promptIdx >= 0){
    const tr = r.trophies[r.promptIdx];
    const target = _currentRequiredTime(tr);
    const remaining = Math.max(0, target - tr.progress);
    if (tr.action === 'grab' && tr.id === 'bricks'){
      const bt = tr.firstGrab ? 15 : 1.2;
      const tleft = Math.max(0, bt - tr.progress);
      r.prompt = r.player.brickHeld > 0
        ? 'You have a brick. CLICK to throw!'
        : `[HOLD E] GRAB BRICK (${tleft.toFixed(1)}s)  ·  ${tr.bricksLeft} left`;
    } else if (tr.action === 'push'){
      r.prompt = `[HOLD E] PUSH ${tr.name} (${remaining.toFixed(1)}s left)`;
    } else if (tr.action === 'break'){
      if (tr.id === 'cage'){
        const pickLion = r.player.x < tr.x;
        tr.releaseChoice = pickLion ? 'lion' : 'bear';
        const animal = pickLion ? 'LION' : 'BEAR';
        r.prompt = `[HOLD E] RELEASE ${animal} (${remaining.toFixed(1)}s left)`;
      } else {
        r.prompt = `[HOLD E] BREAK GLASS (${remaining.toFixed(1)}s left)`;
      }
    }
  }

  if (r.promptIdx >= 0 && keys['e']){
    const tr = r.trophies[r.promptIdx];
    if (tr.id === 'bricks'){
      if (r.player.brickHeld < 1 && tr.bricksLeft > 0){
        tr.progress += dt;
        const need = tr.firstGrab ? 15 : 1.2;
        if (tr.progress >= need){
          tr.progress = 0;
          tr.firstGrab = false;
          tr.bricksLeft--;
          r.player.brickHeld = 1;
          r.hint = 'Brick in hand. Aim with mouse, LEFT-CLICK to throw.';
          r.hintT = 3;
          playSfx('beep', { freq:520, volume:0.3 });
        }
      }
    } else if (!tr.used){
      tr.progress += dt;
      const need = _currentRequiredTime(tr);
      if (tr.progress >= need){
        completeTrophyPush(r.promptIdx);
      }
    }
  } else if (r.promptIdx >= 0){
    const tr = r.trophies[r.promptIdx];
    if (!tr.used){
      tr.progress = Math.max(0, tr.progress - dt*0.3);
    }
  }

  for (const tr of r.trophies){
    if (tr.used && !tr.toppled && tr.toppleT !== undefined){
      tr.toppleT += dt;
      if (tr.toppleT > 0.95){ tr.toppled = true; }
    }
  }

  for (let i = r.bricks.length-1; i >= 0; i--){
    const b = r.bricks[i];
    b.t += dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.vy += 200 * dt;
    const dx = b.x - r.grabby.x, dy = b.y - r.grabby.y;
    if (dx*dx + dy*dy < (r.grabby.radius+8)*(r.grabby.radius+8)){
      applyDamageToGrabby(100, true);
      r.bricks.splice(i,1);
      continue;
    }
    if (b.t > 2.5 || b.y > TROPHY_ROOM_H || b.x < 0 || b.x > TROPHY_ROOM_W){
      r.bricks.splice(i,1);
    }
  }

  updateActGrabby(dt);

  if (r.ally.lion) updateAlly(r.ally.lion, dt);
  if (r.ally.bear) updateAlly(r.ally.bear, dt);

  if (!r.exitOpen && r.grabby.dmgDealt >= 4000){
    r.exitOpen = true;
    r.exitFlashT = 1.0;
    r.grabby.state = 'retreat';
    r.grabby.stateT = 0;
    r.hint = 'The grabby retreats. The red door is open. →';
    r.hintT = 6;
    playSfx('beep', { freq:660, volume:0.5 });
  }
  if (r.exitFlashT > 0) r.exitFlashT -= dt;

  const exitX = TROPHY_ROOM_W - 30, exitY = TROPHY_ROOM_H/2;
  if (r.exitOpen){
    const dx = r.player.x - exitX, dy = r.player.y - exitY;
    if (dx*dx + dy*dy < 70*70){
      initAct3();
      return;
    }
  }
}

function _currentRequiredTime(tr){
  if (tr.slamHits >= 2) return tr.timeTwice;
  if (tr.slamHits >= 1) return tr.timeOnce;
  return tr.timeFull;
}

function completeTrophyPush(idx){
  const r = TROPHY;
  const tr = r.trophies[idx];
  tr.used = true;
  tr.progress = 0;
  tr.toppleT = 0;
  tr.toppleDir = r.player.facing;

  if (tr.action === 'push'){
    const grabbyHit = _segHitsCircle(
      tr.x, tr.y,
      tr.x + Math.cos(tr.toppleDir)*tr.toppleLen,
      tr.y + Math.sin(tr.toppleDir)*tr.toppleLen,
      r.grabby.x, r.grabby.y, r.grabby.radius + 30
    );
    let dmg = tr.dmg;
    if (grabbyHit) dmg = Math.floor(dmg * 1.5);
    // dust kicked up where the trophy crashes down
    const landX = tr.x + Math.cos(tr.toppleDir)*tr.toppleLen;
    const landY = tr.y + Math.sin(tr.toppleDir)*tr.toppleLen;
    a2Spawn(landX, landY, 22, { color:'#7a7268', spdMin:60, spdMax:240, sizeMin:3, sizeMax:8, lifeMin:0.5, lifeMax:1.2, drag:1.6 });
    G.shake = Math.max(G.shake, 14);
    applyDamageToGrabby(dmg, true);
    r.hint = grabbyHit
      ? `${tr.name} crashes down! ${dmg} dmg (direct hit!)`
      : `${tr.name} falls. ${dmg} dmg (grabby was elsewhere).`;
    r.hintT = 3;
  } else if (tr.action === 'break'){
    const pick = tr.releaseChoice || (r.player.x < tr.x ? 'lion' : 'bear');
    if (pick === 'lion'){
      r.ally.lion = makeAlly('lion', tr.x - 30, tr.y);
      r.ally.lion.dmgCap = 1500;
      tr.lionInside = false;
      r.hint = '⚠ Glass shatters! Lion loose. Will do up to 1500 dmg.';
    } else {
      r.ally.bear = makeAlly('bear', tr.x + 30, tr.y);
      r.ally.bear.dmgCap = 1500;
      tr.bearInside = false;
      r.hint = '⚠ Glass shatters! Bear loose. Will do up to 1500 dmg.';
    }
    r.hintT = 4;
    playSfx('warn', { volume:0.5 });
  }
}

function makeAlly(kind, x, y){
  return {
    kind: kind,
    x: x, y: y, vx:0, vy:0,
    radius: kind === 'bear' ? 28 : 26,
    facing: 0,
    walk: 0,
    hp: kind === 'bear' ? 1200 : 900,
    hpMax: kind === 'bear' ? 1200 : 900,
    attackT: 0,
    dead: false,
    dmgDealt: 0,
    dmgCap: 750,
    retreating: false,
  };
}

function updateAlly(a, dt){
  if (a.dead) return;
  const r = TROPHY;
  if (a.hp <= 0){ a.dead = true; return; }

  if (a.dmgDealt >= a.dmgCap){
    a.retreating = true;
  }

  if (a.retreating){
    const tx = TROPHY_ROOM_W - 280, ty = TROPHY_ROOM_H - 270;
    const dx = tx - a.x, dy = ty - a.y;
    const d = Math.hypot(dx,dy)+0.01;
    if (d < 30){ a.dead = true; return; }
    const speed = 100;
    a.vx = dx/d * speed; a.vy = dy/d * speed;
    a.x += a.vx * dt; a.y += a.vy * dt;
    a.facing = Math.atan2(dy, dx);
    a.walk += dt*4;
    return;
  }

  const dx = r.grabby.x - a.x, dy = r.grabby.y - a.y;
  const d = Math.hypot(dx,dy)+0.01;
  const speed = a.kind === 'bear' ? 140 : 170;
  a.vx = dx/d * speed; a.vy = dy/d * speed;
  a.x += a.vx * dt; a.y += a.vy * dt;
  a.x = clamp(a.x, 60, TROPHY_ROOM_W - 60);
  a.y = clamp(a.y, 60, TROPHY_ROOM_H - 60);
  a.facing = Math.atan2(dy, dx);
  a.walk += dt * (speed/40);

  if (d < a.radius + r.grabby.radius + 4){
    a.attackT -= dt;
    if (a.attackT <= 0){
      a.attackT = a.kind === 'bear' ? 0.55 : 0.4;
      const baseDmg = a.kind === 'bear' ? 90 : 70;
      const remaining = a.dmgCap - a.dmgDealt;
      const dmg = Math.min(baseDmg, remaining);
      if (dmg > 0){
        applyDamageToGrabby(dmg, false);
        a.dmgDealt += dmg;
      }
      a.hp -= 35;
    }
  }
}

function updateActGrabby(dt){
  const r = TROPHY;
  const g = r.grabby;
  g.stateT += dt;

  if (g.state === 'retreat'){
    const tx = TROPHY_ROOM_W - 100, ty = 100;
    const dx = tx - g.x, dy = ty - g.y;
    const d = Math.hypot(dx,dy)+0.01;
    g.vx = dx/d * 200; g.vy = dy/d * 200;
    g.x += g.vx * dt; g.y += g.vy * dt;
    g.walk += dt*4;
    g.facing = Math.atan2(dy, dx);
    if (g.flashT > 0) g.flashT -= dt;
    return;
  }

  if (g.state === 'stunned'){
    g.vx = 0; g.vy = 0;
    if (g.stateT > g.stunDur){ g.state = 'hunt'; g.stateT = 0; }
    if (g.flashT > 0) g.flashT -= dt;
    return;
  }
  if (g.flashT > 0) g.flashT -= dt;

  const playerLOS = _hasLOS(g.x, g.y, r.player.x, r.player.y);
  let aliveAlly = null;
  for (const a of [r.ally.lion, r.ally.bear]){
    if (a && !a.dead){ aliveAlly = a; break; }
  }

  if (playerLOS){
    g.knowsPlayer = true;
    g.lastSeenX = r.player.x;
    g.lastSeenY = r.player.y;
    g.losMemoryT = 1.5;
    g.searchT = 0;
  } else if (g.losMemoryT > 0){
    g.losMemoryT -= dt;
    if (g.losMemoryT > 0.8){
      g.lastSeenX = r.player.x;
      g.lastSeenY = r.player.y;
    }
  } else if (g.knowsPlayer){
    g.knowsPlayer = false;
    g.searchT = 0;
    g.state = 'search';
  }

  // rising edge: the moment it spots the player — sharp sting + jolt
  if (g.knowsPlayer && !g._wasKnown){
    playSfx('alarm', { volume:0.5 });
    G.shake = Math.max(G.shake, 9);
  }
  g._wasKnown = g.knowsPlayer;

  let target = null;
  if (aliveAlly){
    target = aliveAlly;
  } else if (g.knowsPlayer || g.losMemoryT > 0){
    target = r.player;
  } else if (g.state === 'search'){
    target = { x: g.lastSeenX, y: g.lastSeenY };
  } else {
    if (!g._patrolX || g.stateT > 4){
      g._patrolX = 200 + Math.random() * (TROPHY_ROOM_W - 400);
      g._patrolY = 200 + Math.random() * (TROPHY_ROOM_H - 400);
      g.stateT = 0;
    }
    target = { x: g._patrolX, y: g._patrolY };
  }
  g.target = target;

  const dx = target.x - g.x, dy = target.y - g.y;
  const dist = Math.hypot(dx, dy) + 0.01;
  let mvx = dx/dist, mvy = dy/dist;

  for (const tr of r.trophies){
    if (tr.toppled || tr.used) continue;
    const tdx = tr.x - g.x, tdy = tr.y - g.y;
    const td = Math.hypot(tdx, tdy);
    if (td < 100 && td > 0.01){
      const ax = -tdy/td, ay = tdx/td;
      const dot = (target.x - g.x)*ax + (target.y - g.y)*ay;
      const sign = dot >= 0 ? 1 : -1;
      const strength = clamp((100-td)/100, 0, 1) * 1.2;
      mvx += ax*sign*strength; mvy += ay*sign*strength;

      if (td < tr.size*0.85 && (g.state === 'hunt' || g.state === 'lunge')){
        if (!tr._slamCooldown){ tr._slamCooldown = 0; }
        tr._slamCooldown -= dt;
        if (tr._slamCooldown <= 0 && tr.slamHits < 2 && !tr.used){
          tr.slamHits++;
          tr._slamCooldown = 2.5;
          r.hint = `The grabby slammed into ${tr.name}! (${tr.slamHits}/2 hits — push is faster now)`;
          r.hintT = 3;
        }
      }
    }
  }
  for (const c of r.cover){
    const ccx = c.x + c.w/2, ccy = c.y + c.h/2;
    const cR = Math.max(c.w, c.h) * 0.7;
    const cdx = ccx - g.x, cdy = ccy - g.y;
    const cd = Math.hypot(cdx, cdy);
    if (cd < cR + 40 && cd > 0.01){
      const ax = -cdy/cd, ay = cdx/cd;
      const dot = (target.x - g.x)*ax + (target.y - g.y)*ay;
      const sign = dot >= 0 ? 1 : -1;
      const strength = clamp(((cR+40)-cd)/(cR+40), 0, 1) * 1.0;
      mvx += ax*sign*strength; mvy += ay*sign*strength;
    }
  }
  const nrm = Math.hypot(mvx, mvy)+0.01; mvx /= nrm; mvy /= nrm;

  if (g.state === 'hunt'){
    g.vx = mvx * 140; g.vy = mvy * 140;
    const canLunge = (target === r.player && g.knowsPlayer) || (target === aliveAlly);
    if (canLunge && dist < 200){ g.state = 'windup'; g.stateT = 0; playSfx('warn', { volume:0.45 }); }
  } else if (g.state === 'search'){
    g.vx = mvx * 110; g.vy = mvy * 110;
    g.searchT += dt;
    if (dist < 80){
      g.vx = 0; g.vy = 0;
      g.facing = Math.atan2(Math.sin(g.searchT*1.8), Math.cos(g.searchT*1.8));
      if (g.searchT > 4){
        g.state = 'patrol';
        g.stateT = 0;
        g._patrolX = 0;
      }
    }
  } else if (g.state === 'patrol'){
    g.vx = mvx * 90; g.vy = mvy * 90;
    if (g.knowsPlayer){ g.state = 'hunt'; g.stateT = 0; }
  } else if (g.state === 'windup'){
    g.vx = 0; g.vy = 0;
    if (g.stateT > 0.45){
      g.state = 'lunge'; g.stateT = 0;
      g.lungeVX = mvx; g.lungeVY = mvy;
      playSfx('plasma', { volume:0.4 });
      G.shake = Math.max(G.shake, 7);
      a2Spawn(g.x, g.y, 10, { ang: Math.atan2(mvy, mvx)+Math.PI, color:'#3a1414', spdMin:60, spdMax:200, sizeMin:2, sizeMax:5, lifeMin:0.25, lifeMax:0.6 });
    }
  } else if (g.state === 'lunge'){
    g.vx = g.lungeVX * 480; g.vy = g.lungeVY * 480;
    if (g.stateT > 0.35){ g.state = 'hunt'; g.stateT = 0; }
    if (target === r.player && dist < g.radius + r.player.radius - 4){
      G.state='dead'; G.deathT=0;
    }
  }

  let gx = g.x + g.vx * dt, gy = g.y + g.vy * dt;
  gx = clamp(gx, 60, TROPHY_ROOM_W - 60);
  gy = clamp(gy, 60, TROPHY_ROOM_H - 60);
  const resolved = _circleCollideTrophies(gx, gy, g.radius * 0.8);
  g.x = resolved.x; g.y = resolved.y;
  if (g.state !== 'search' || dist > 80){
    g.facing = Math.atan2(target.y - g.y, target.x - g.x);
  }
  g.walk += dt * (Math.hypot(g.vx, g.vy)/100);

  if (g.state !== 'stunned' && g.knowsPlayer){
    const pdx = r.player.x - g.x, pdy = r.player.y - g.y;
    if (pdx*pdx + pdy*pdy < (g.radius + r.player.radius - 4)*(g.radius + r.player.radius - 4)){
      G.state='dead'; G.deathT=0;
    }
  }
}

function applyDamageToGrabby(amount, isImpact){
  const r = TROPHY;
  const g = r.grabby;
  if (g.state === 'retreat') return;
  g.hp -= amount;
  g.dmgDealt += amount;
  if (isImpact){
    g.flashT = 0.35;
    g.state = 'stunned';
    g.stateT = 0;
    g.stunDur = clamp(amount/800, 0.4, 2.5);
    playSfx('thud', { volume:0.6 });
    playSfx('hit', { volume:0.5 });
    G.shake = Math.max(G.shake, clamp(6 + amount/120, 6, 22));
    a2Spawn(g.x, g.y, 14, { color:'#8a8276', spdMin:80, spdMax:280, sizeMin:2, sizeMax:6, lifeMin:0.3, lifeMax:0.8 });
    a2Spawn(g.x, g.y, 8,  { color:'#3a2018', spdMin:40, spdMax:160, sizeMin:3, sizeMax:7, lifeMin:0.4, lifeMax:1.0 });
  }
}

function _segHitsCircle(ax, ay, bx, by, cx, cy, r){
  const dx = bx-ax, dy = by-ay;
  const len2 = dx*dx+dy*dy;
  let t = 0;
  if (len2 > 0.001){
    t = ((cx-ax)*dx + (cy-ay)*dy) / len2;
    t = clamp(t, 0, 1);
  }
  const px = ax + dx*t, py = ay + dy*t;
  const ddx = px-cx, ddy = py-cy;
  return (ddx*ddx + ddy*ddy) < r*r;
}
