    X.rotate(b.t * 8);
    X.fillStyle = '#a8643a';
    X.fillRect(-8, -5, 16, 10);
    X.fillStyle = '#6a3818'; X.fillRect(-8, -5, 16, 1);
    X.restore();
  }

  if (r.ally.bear) drawAllyTop(r.ally.bear, cam);
  if (r.ally.lion) drawAllyTop(r.ally.lion, cam);

  drawGrabbyTop(r.grabby, cam);
  a2DrawParticles(cam);

  {
    const g = r.grabby;
    if (g.state !== 'retreat' && g.state !== 'stunned'){
      const sx = g.x - cam.x, sy = g.y - cam.y - g.radius - 22;
      let symbol = '', color = '#fff';
      if (g.knowsPlayer || g.losMemoryT > 0){
        symbol = '!'; color = '#ff4040';
      } else if (g.state === 'search'){
        symbol = '?'; color = '#ffd040';
      } else if (g.state === 'patrol'){
        symbol = '·'; color = '#aaaaaa';
      }
      if (symbol){
        X.fillStyle = 'rgba(0,0,0,0.7)';
        X.beginPath(); X.arc(sx, sy, 10, 0, Math.PI*2); X.fill();
        X.fillStyle = color;
        X.font = 'bold 14px Courier New'; X.textAlign='center';
        X.fillText(symbol, sx, sy + 5);
      }
    }
  }

  drawPlayerTop(r.player, cam);

  {
    const px = r.player.x - cam.x;
    const py = r.player.y - cam.y;
    const len = r.player.brickHeld > 0 ? 90 : 60;
    const tx = px + Math.cos(r.player.facing) * len;
    const ty = py + Math.sin(r.player.facing) * len;
    X.strokeStyle = r.player.brickHeld > 0 ? 'rgba(255,200,120,0.45)' : 'rgba(180,220,255,0.25)';
    X.lineWidth = 2;
    X.setLineDash([4, 5]);
    X.beginPath(); X.moveTo(px, py); X.lineTo(tx, ty); X.stroke();
    X.setLineDash([]);
    X.fillStyle = r.player.brickHeld > 0 ? 'rgba(255,200,120,0.7)' : 'rgba(180,220,255,0.5)';
    X.save(); X.translate(tx, ty); X.rotate(r.player.facing);
    X.beginPath();
    X.moveTo(0,0); X.lineTo(-8,-4); X.lineTo(-8,4); X.closePath(); X.fill();
    X.restore();
  }

  drawAct2Horror(r);

  drawTrophyHUD(r);
}

// ---- proximity/spotted horror overlay: VHS static, red dread, vignette ----
function drawAct2Horror(r){
  const g = r.grabby;
  const d = Math.hypot(g.x - r.player.x, g.y - r.player.y);
  const near = (g.state === 'retreat') ? 0 : clamp(1 - d/420, 0, 1);
  const spotted = (g.knowsPlayer || g.losMemoryT > 0) ? 1 : 0;
  const dread = Math.max(near*0.7, spotted ? 0.85 : 0);
  const t = r.t;

  // tightening dark vignette — closes in as dread rises
  const inner = lerp(300, 150, dread);
  const vg = X.createRadialGradient(W/2, H/2, inner, W/2, H/2, 660);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, `rgba(0,0,0,${lerp(0.35, 0.78, dread)})`);
  X.fillStyle = vg; X.fillRect(0,0,W,H);

  if (dread <= 0.02) return;

  // sick red wash, pulsing, stronger when actually spotted
  const pulse = 0.5 + 0.5*Math.sin(t*(spotted?9:5));
  const redA = (spotted ? 0.10 : 0.05) * dread * (0.6 + 0.4*pulse);
  const rv = X.createRadialGradient(W/2, H/2, 200, W/2, H/2, 680);
  rv.addColorStop(0, 'rgba(0,0,0,0)');
  rv.addColorStop(1, `rgba(150,10,8,${redA})`);
  X.fillStyle = rv; X.fillRect(0,0,W,H);

  // VHS scanlines, density scales with dread
  X.fillStyle = `rgba(0,0,0,${0.05 + 0.10*dread})`;
  const step = 3;
  const jit = (Math.floor(t*60) % 2) * 1;
  for (let y = jit; y < H; y += step) X.fillRect(0, y, W, 1);

  // grain
  const grainN = Math.floor(40 + dread*120);
  for (let i = 0; i < grainN; i++){
    X.fillStyle = `rgba(255,255,255,${Math.random()*0.06*dread})`;
    X.fillRect(Math.random()*W, Math.random()*H, 2, 2);
  }

  // tracking glitch bands when spotted
  if (spotted && (Math.floor(t*10)%4)===0){
    const gy = Math.random()*H;
    X.fillStyle = 'rgba(255,255,255,0.06)';
    X.fillRect(0, gy, W, 3 + Math.random()*4);
    X.fillStyle = 'rgba(150,10,8,0.10)';
    X.fillRect(0, gy+3, W, 2);
  }

  // hard edge flash the instant it lunges
  if (g.state === 'lunge'){
    X.fillStyle = `rgba(180,20,16,${0.12 + 0.10*pulse})`;
    X.fillRect(0,0,W,H);
  }
}

function drawTrophyTop(tr, cam){
  if (tr.toppled && tr.id !== 'bricks' && tr.id !== 'cage'){
    drawTrophyDebris(tr, cam);
    return;
  }
  const sx = tr.x - cam.x, sy = tr.y - cam.y;
  if (sx < -150 || sx > W+150 || sy < -150 || sy > H+150) return;

  if (!tr.used){
    const sg = X.createRadialGradient(sx, sy, 6, sx, sy, tr.size+30);
    sg.addColorStop(0, 'rgba(255,220,170,0.18)');
    sg.addColorStop(1, 'rgba(255,200,150,0)');
    X.fillStyle = sg;
    X.beginPath(); X.arc(sx, sy, tr.size+30, 0, Math.PI*2); X.fill();
  }

  const fall = (tr.used && tr.toppleT !== undefined) ? Math.min(1, tr.toppleT/0.95) : 0;
  const slideX = (tr.toppleDir!==undefined) ? Math.cos(tr.toppleDir) * (tr.toppleLen||0) * fall : 0;
  const slideY = (tr.toppleDir!==undefined) ? Math.sin(tr.toppleDir) * (tr.toppleLen||0) * fall : 0;
  const rot = fall * 1.4;

  if (!tr.used){
    X.fillStyle = '#3a2010';
    X.fillRect(sx-50, sy+tr.size+8, 100, 14);
    X.strokeStyle = '#a07028'; X.lineWidth = 1;
    X.strokeRect(sx-50, sy+tr.size+8, 100, 14);
    X.fillStyle = '#d4a058';
    X.font = 'bold 8px Courier New'; X.textAlign='center';
    X.fillText(tr.name, sx, sy+tr.size+18);
  }

  X.save();
  X.translate(sx+slideX, sy+slideY);
  X.rotate(rot + (tr.tilt||0));

  switch(tr.type){
    case 'tree':    drawTopTree(tr.size, tr.slamHits); break;
    case 'rocket':  drawTopRocketTall(tr.size, tr.slamHits); break;
    case 'rex':     drawTopRex(tr.size, tr.slamHits); break;
    case 'cage':    drawTopCage(tr.size, tr.used, tr.progress, tr.timeFull, tr.lionInside, tr.bearInside, tr.releaseChoice); break;
    case 'bricks':  drawTopBrickPile(tr.size, tr.bricksLeft); break;
  }
  X.restore();

  if (!tr.used && tr.progress > 0 && tr.id === TROPHY.trophies[TROPHY.promptIdx]?.id){
    const need = _currentRequiredTime(tr);
    const p = clamp(tr.progress / need, 0, 1);
    X.strokeStyle = 'rgba(120,255,180,0.4)'; X.lineWidth = 6;
    X.beginPath(); X.arc(sx, sy, tr.size+18, -Math.PI/2, -Math.PI/2 + p*Math.PI*2);
    X.stroke();
    X.strokeStyle = '#28d878'; X.lineWidth = 3;
    X.beginPath(); X.arc(sx, sy, tr.size+18, -Math.PI/2, -Math.PI/2 + p*Math.PI*2);
    X.stroke();
  }
  if (tr.id === 'bricks' && tr.progress > 0 && tr === TROPHY.trophies[TROPHY.promptIdx]){
    const need = tr.firstGrab ? 15 : 1.2;
    const p = clamp(tr.progress / need, 0, 1);
    X.strokeStyle = 'rgba(255,200,120,0.4)'; X.lineWidth = 6;
    X.beginPath(); X.arc(sx, sy, tr.size+18, -Math.PI/2, -Math.PI/2 + p*Math.PI*2);
    X.stroke();
    X.strokeStyle = '#ffa040'; X.lineWidth = 3;
    X.beginPath(); X.arc(sx, sy, tr.size+18, -Math.PI/2, -Math.PI/2 + p*Math.PI*2);
    X.stroke();
  }

  if (!tr.used && tr.slamHits > 0){
    for (let i=0; i<tr.slamHits; i++){
      X.fillStyle = '#ffa040';
      X.beginPath(); X.arc(sx - 10 + i*20, sy - tr.size - 14, 5, 0, Math.PI*2); X.fill();
    }
  }
}

function drawTrophyDebris(tr, cam){
  const sx = tr.x - cam.x, sy = tr.y - cam.y;
  if (sx < -150 || sx > W+150 || sy < -150 || sy > H+150) return;
  switch (tr.type){
    case 'tree': {
      X.save(); X.translate(sx, sy); X.rotate(tr.toppleDir);
      X.fillStyle = '#3a2010';
      X.fillRect(0, -14, tr.toppleLen, 28);
      X.fillStyle = '#5a3818';
      X.fillRect(0, -10, tr.toppleLen, 4);
      X.fillStyle = '#1e4a1e';
      X.beginPath(); X.arc(tr.toppleLen, 0, 60, 0, Math.PI*2); X.fill();
      X.fillStyle = '#2a5a28';
      X.beginPath(); X.arc(tr.toppleLen-30, -30, 36, 0, Math.PI*2); X.fill();
      X.beginPath(); X.arc(tr.toppleLen-30,  30, 36, 0, Math.PI*2); X.fill();
      X.restore();
      break;
    }
    case 'rocket': {
      X.save(); X.translate(sx, sy); X.rotate(tr.toppleDir);
      X.fillStyle = '#e8e8e8';
      X.fillRect(0, -16, tr.toppleLen, 32);
      X.fillStyle = '#1a1a1a';
      X.fillRect(20, -16, 4, 32);
      X.fillRect(80, -16, 4, 32);
      X.fillRect(140, -16, 4, 32);
      X.fillStyle = '#e8e8e8';
      X.beginPath();
      X.moveTo(tr.toppleLen, -16);
      X.lineTo(tr.toppleLen + 30, 0);
      X.lineTo(tr.toppleLen, 16);
      X.closePath(); X.fill();
      X.fillStyle = '#3a3a3a';
      X.fillRect(-12, -16, 12, 32);
      X.restore();
      break;
    }
    case 'rex': {
      X.save(); X.translate(sx, sy); X.rotate(tr.toppleDir);
      X.fillStyle = '#dad0b0';
      X.fillRect(0, -3, tr.toppleLen, 6);
      for (let i=0; i<8; i++){
        X.fillRect(20 + i*15, -28, 2, 56);
      }
      X.beginPath(); X.ellipse(tr.toppleLen+10, 0, 30, 18, 0, 0, Math.PI*2); X.fill();
      X.fillStyle = '#1a1408';
      X.beginPath(); X.arc(tr.toppleLen+18, -3, 5, 0, Math.PI*2); X.fill();
      X.fillStyle = '#fff';
      for (let i=0; i<5; i++){
        X.beginPath();
        X.moveTo(tr.toppleLen+30 - i*5, 12);
        X.lineTo(tr.toppleLen+32 - i*5, 20);
        X.lineTo(tr.toppleLen+34 - i*5, 12);
        X.closePath(); X.fill();
      }
      X.restore();
      break;
    }
  }
}

function drawTopTree(s, slamHits){
  X.fillStyle = 'rgba(20,8,2,0.5)';
  X.beginPath(); X.arc(0, 0, s*1.1, 0, Math.PI*2); X.fill();
  X.fillStyle = '#0c1e10';
  X.beginPath(); X.arc(0, 0, s*1.05, 0, Math.PI*2); X.fill();
  X.fillStyle = '#1a3a1c';
  X.beginPath();
  const pts = 14;
  for (let i = 0; i < pts; i++){
    const ang = (i/pts) * Math.PI*2;
    const r0 = s * (0.85 + 0.15 * Math.sin(i*2.1 + 3.7));
    const x = Math.cos(ang) * r0;
    const y = Math.sin(ang) * r0;
    if (i===0) X.moveTo(x, y); else X.lineTo(x, y);
  }
  X.closePath(); X.fill();
  X.fillStyle = '#2a5a2a';
  X.beginPath(); X.arc(-s*0.35, -s*0.25, s*0.42, 0, Math.PI*2); X.fill();
  X.beginPath(); X.arc(s*0.30, -s*0.20, s*0.40, 0, Math.PI*2); X.fill();
  X.beginPath(); X.arc(-s*0.10, s*0.40, s*0.40, 0, Math.PI*2); X.fill();
  X.beginPath(); X.arc(s*0.35, s*0.28, s*0.34, 0, Math.PI*2); X.fill();
  X.beginPath(); X.arc(0, -s*0.45, s*0.28, 0, Math.PI*2); X.fill();
  X.fillStyle = '#3e8a3a';
  X.beginPath(); X.arc(-s*0.30, -s*0.30, s*0.18, 0, Math.PI*2); X.fill();
  X.beginPath(); X.arc(s*0.22, -s*0.10, s*0.16, 0, Math.PI*2); X.fill();
  X.beginPath(); X.arc(s*0.05, s*0.32, s*0.20, 0, Math.PI*2); X.fill();
  X.beginPath(); X.arc(-s*0.20, s*0.20, s*0.14, 0, Math.PI*2); X.fill();
  X.fillStyle = '#4daa44';
  const leafPts = [
    [-0.4,-0.4],[0.1,-0.5],[0.4,-0.3],[-0.3,0.0],[0.3,0.1],
    [-0.4,0.3],[0.0,0.4],[0.4,0.4],[-0.2,-0.2],[0.2,0.3]
  ];
  for (const [lx,ly] of leafPts){
    X.beginPath(); X.arc(lx*s, ly*s, s*0.05, 0, Math.PI*2); X.fill();
  }
  X.fillStyle = '#3a2010';
  X.beginPath(); X.arc(0, 0, s*0.22, 0, Math.PI*2); X.fill();
  X.fillStyle = '#1a0c04';
  X.beginPath(); X.arc(0, 0, s*0.18, 0, Math.PI*2); X.fill();
  X.fillStyle = '#5a3818';
  X.beginPath(); X.arc(-s*0.02, -s*0.02, s*0.14, 0, Math.PI*2); X.fill();
  X.fillStyle = '#3a2010';
  X.beginPath(); X.arc(0, 0, s*0.10, 0, Math.PI*2); X.fill();
  X.fillStyle = '#1a0c04';
  X.beginPath(); X.arc(0, 0, s*0.06, 0, Math.PI*2); X.fill();
  X.strokeStyle = '#0a0402'; X.lineWidth = 1;
  for (let i=0;i<5;i++){
    const ang = i * Math.PI*2/5 + 0.3;
    X.beginPath();
    X.moveTo(Math.cos(ang)*s*0.03, Math.sin(ang)*s*0.03);
    X.lineTo(Math.cos(ang)*s*0.20, Math.sin(ang)*s*0.20);
    X.stroke();
  }
  if (slamHits > 0){
    X.strokeStyle = '#1a0c04'; X.lineWidth = 3;
    X.beginPath();
    X.moveTo(-s*0.5, -s*0.15);
    X.lineTo(-s*0.15, -s*0.05);
    X.lineTo(-s*0.35, s*0.15);
    X.lineTo(s*0.1, s*0.4);
    X.stroke();
    if (slamHits > 1){
      X.beginPath();
      X.moveTo(s*0.4, -s*0.4);
      X.lineTo(s*0.1, -s*0.1);
      X.lineTo(-s*0.3, s*0.0);
      X.lineTo(-s*0.5, s*0.4);
      X.stroke();
    }
  }
}

function drawTopRex(s, slamHits){
  X.fillStyle = 'rgba(0,0,0,0.4)';
  X.beginPath(); X.ellipse(0, 0, s*0.7, s*1.1, 0, 0, Math.PI*2); X.fill();
  X.strokeStyle = '#4a4a50'; X.lineWidth = 2;
  X.beginPath(); X.moveTo(0, -s*0.9); X.lineTo(0, s*1.0); X.stroke();
  for (let i = 0; i < 8; i++){
    const seg = i / 7;
    const cy = s * (0.3 + seg * 0.7);
    const wave = Math.sin(seg * Math.PI * 1.2) * s * 0.08;
    const w = s * (0.10 - seg * 0.08);
    X.fillStyle = i % 2 === 0 ? '#d4c8a0' : '#c0b48c';
    X.fillRect(wave - w, cy, w*2, s*0.07);
    X.fillStyle = '#a89c78';
    X.fillRect(wave - w*0.5, cy, w, s*0.025);
  }
  X.fillStyle = '#d4c8a0';
  X.beginPath();
  X.moveTo(-s*0.30, s*0.15);
  X.lineTo(-s*0.40, s*0.30);
  X.lineTo(-s*0.20, s*0.40);
  X.lineTo(s*0.20, s*0.40);
  X.lineTo(s*0.40, s*0.30);
  X.lineTo(s*0.30, s*0.15);
  X.closePath(); X.fill();
  X.strokeStyle = '#8a7c58'; X.lineWidth = 1;
  X.stroke();
  X.fillStyle = '#1a0e08';
  X.beginPath(); X.arc(0, s*0.28, s*0.08, 0, Math.PI*2); X.fill();
  X.fillStyle = '#c0b48c';
  X.beginPath();

  X.lineTo(-s*0.45, s*0.65);
  X.lineTo(-s*0.20, s*0.45);

  X.moveTo(s*0.35, s*0.30);
  X.lineTo(s*0.55, s*0.45);
  X.lineTo(s*0.45, s*0.65);
  X.lineTo(s*0.20, s*0.45);
  X.closePath(); X.fill();
  X.stroke();
  X.fillStyle = '#c0b48c';

  X.fillRect(s*0.45, s*0.55, s*0.10, s*0.30);
  X.strokeRect(-s*0.55, s*0.55, s*0.10, s*0.30);
  X.strokeRect(s*0.45, s*0.55, s*0.10, s*0.30);
  X.fillStyle = '#1a1408';
  for (let i=0; i<3; i++){
    X.beginPath();
    X.moveTo(-s*0.55 + i*s*0.05, s*0.85);
    X.lineTo(-s*0.53 + i*s*0.05, s*0.95);
    X.lineTo(-s*0.50 + i*s*0.05, s*0.85);
    X.closePath(); X.fill();
    X.beginPath();
    X.moveTo(s*0.45 + i*s*0.05, s*0.85);
    X.lineTo(s*0.47 + i*s*0.05, s*0.95);
    X.lineTo(s*0.50 + i*s*0.05, s*0.85);
    X.closePath(); X.fill();
  }
  X.fillStyle = '#d4c8a0';
  X.fillRect(-s*0.06, -s*0.50, s*0.12, s*0.65);
  X.fillStyle = '#a89c78';
  for (let i=0;i<7;i++){
    X.fillRect(-s*0.08, -s*0.48 + i*s*0.09, s*0.16, s*0.025);
  }
  X.strokeStyle = '#d4c8a0'; X.lineWidth = s*0.05;
  X.lineCap = 'round';
  for (let i=0; i<5; i++){
    const ry = -s*0.40 + i*s*0.12;
    const rw = s*0.30 - i*s*0.02;
    X.beginPath();
    X.moveTo(0, ry);
    X.bezierCurveTo(-rw, ry, -rw - s*0.05, ry + s*0.08, -rw + s*0.04, ry + s*0.16);
    X.stroke();
    X.beginPath();
    X.moveTo(0, ry);
    X.bezierCurveTo(rw, ry, rw + s*0.05, ry + s*0.08, rw - s*0.04, ry + s*0.16);
    X.stroke();
  }
  X.lineCap = 'butt';
  X.fillStyle = '#c0b48c';
  X.fillRect(-s*0.30, -s*0.30, s*0.04, s*0.15);
  X.fillRect(s*0.26, -s*0.30, s*0.04, s*0.15);
  X.fillStyle = '#1a1408';
  X.fillRect(-s*0.31, -s*0.18, s*0.02, s*0.06);
  X.fillRect(s*0.29, -s*0.18, s*0.02, s*0.06);
  X.fillStyle = '#d4c8a0';
  X.beginPath();
  X.moveTo(-s*0.08, -s*0.50);
  X.lineTo(-s*0.12, -s*0.70);
  X.lineTo(s*0.12, -s*0.70);
  X.lineTo(s*0.08, -s*0.50);
  X.closePath(); X.fill();
  X.fillStyle = '#a89c78';
  for (let i=0;i<3;i++){
    X.fillRect(-s*0.10, -s*0.65 + i*s*0.06, s*0.20, s*0.02);
  }
  X.fillStyle = '#d4c8a0';
  X.beginPath();
  X.moveTo(-s*0.15, -s*0.70);
  X.lineTo(-s*0.22, -s*0.85);
  X.lineTo(-s*0.18, -s*1.05);
  X.lineTo(s*0.18, -s*1.05);
  X.lineTo(s*0.22, -s*0.85);
  X.lineTo(s*0.15, -s*0.70);
  X.closePath(); X.fill();
  X.strokeStyle = '#8a7c58'; X.lineWidth = 1; X.stroke();
  X.fillStyle = '#1a0e08';
  X.beginPath(); X.arc(-s*0.10, -s*0.85, s*0.05, 0, Math.PI*2); X.fill();
  X.beginPath(); X.arc(s*0.10, -s*0.85, s*0.05, 0, Math.PI*2); X.fill();
  X.fillRect(-s*0.03, -s*1.0, s*0.06, s*0.04);
  X.fillStyle = '#fffae8';
  for (let i=-2; i<=2; i++){
    X.beginPath();
    X.moveTo(i*s*0.06 - s*0.02, -s*0.72);
    X.lineTo(i*s*0.06,           -s*0.62);
    X.lineTo(i*s*0.06 + s*0.02, -s*0.72);
    X.closePath(); X.fill();
  }
  if (slamHits > 0){
    X.strokeStyle = '#6a5028'; X.lineWidth = 2;
    X.beginPath(); X.moveTo(-s*0.25, -s*0.20); X.lineTo(-s*0.10, s*0.00); X.stroke();
    X.beginPath(); X.moveTo(-s*0.30, -s*0.30); X.lineTo(-s*0.12, -s*0.30); X.stroke();
    if (slamHits > 1){
      X.beginPath(); X.moveTo(s*0.20, s*0.30); X.lineTo(s*0.00, s*0.50); X.stroke();
      X.strokeStyle = '#8a7c58'; X.lineWidth = s*0.04;
      X.lineCap = 'round';
      X.beginPath();
      X.moveTo(0, -s*0.04);
      X.bezierCurveTo(-s*0.18, s*0.04, -s*0.30, s*0.18, -s*0.20, s*0.30);
      X.stroke();
      X.lineCap = 'butt';
    }
  }
}

function drawTopCage(s, used, progress, timeFull, lionInside, bearInside, releaseChoice){
  X.fillStyle = used ? 'rgba(180,200,220,0.1)' : 'rgba(180,200,220,0.18)';
  X.fillRect(-s, -s*0.7, s*2, s*1.4);
  X.strokeStyle = used ? 'rgba(220,230,240,0.3)' : 'rgba(220,230,240,0.6)';
  X.lineWidth = 2;
  X.strokeRect(-s, -s*0.7, s*2, s*1.4);
  if (!used){
    X.strokeStyle = 'rgba(220,230,240,0.4)'; X.lineWidth = 1;
    X.beginPath(); X.moveTo(0, -s*0.7); X.lineTo(0, s*0.7); X.stroke();
  }
  if (!used && releaseChoice){
    const hx = releaseChoice === 'lion' ? -s : 0;
    X.fillStyle = 'rgba(120,255,180,0.10)';
    X.fillRect(hx, -s*0.7, s, s*1.4);
    X.strokeStyle = 'rgba(120,255,180,0.7)'; X.lineWidth = 2;
    X.strokeRect(hx, -s*0.7, s, s*1.4);
  }
  if (!used && progress > 0){
    X.strokeStyle = 'rgba(220,230,240,0.7)';
    X.lineWidth = 1;
    const cn = Math.floor((progress / timeFull) * 8);
    for (let i=0; i<cn; i++){
      const sxs = -s*0.7 + i*s*0.2;
      X.beginPath();
      X.moveTo(sxs, -s*0.5); X.lineTo(sxs+s*0.1, s*0.3);
      X.stroke();
    }
  }
  if (used){
    X.fillStyle = 'rgba(220,230,240,0.6)';
    for (let i=0; i<10; i++){
      X.fillRect(-s + i*s*0.2, -s*0.65 + Math.sin(i)*5, 4, 2);
    }
    X.strokeStyle = 'rgba(220,230,240,0.3)';
    X.lineWidth = 1;
    X.strokeRect(-s, -s*0.7, s*2, s*1.4);
  }
  if (lionInside !== false){
    X.fillStyle = '#c89858';
    X.beginPath(); X.arc(-s*0.5, 0, s*0.32, 0, Math.PI*2); X.fill();
    X.fillStyle = '#8a6028';
    X.beginPath(); X.arc(-s*0.5, -s*0.15, s*0.22, 0, Math.PI*2); X.fill();
    X.fillStyle = '#c89858';
    X.beginPath(); X.arc(-s*0.5, -s*0.18, s*0.13, 0, Math.PI*2); X.fill();
    X.fillStyle = '#000';
    X.fillRect(-s*0.56, -s*0.22, 3, 3);
    X.fillRect(-s*0.46, -s*0.22, 3, 3);
    X.fillStyle = '#3a1808';
    X.fillRect(-s*0.51, -s*0.16, 2, 2);
    X.strokeStyle = '#8a6028'; X.lineWidth = 3;
    X.beginPath();
    X.moveTo(-s*0.78, 0); X.lineTo(-s*0.92, s*0.15); X.stroke();
    X.fillStyle = '#8a6028';
    X.beginPath(); X.arc(-s*0.92, s*0.15, 4, 0, Math.PI*2); X.fill();
    X.fillStyle = '#fff8c8'; X.font = `bold ${(s*0.12)|0}px Courier New`; X.textAlign='center';
    X.fillText('LION', -s*0.5, s*0.5);
  }
  if (bearInside !== false){
    X.fillStyle = '#3a2818';
    X.beginPath(); X.arc(s*0.5, 0, s*0.34, 0, Math.PI*2); X.fill();
    X.beginPath(); X.arc(s*0.5, -s*0.18, s*0.18, 0, Math.PI*2); X.fill();
    X.fillStyle = '#5a3820';
    X.beginPath(); X.arc(s*0.5, -s*0.22, s*0.08, 0, Math.PI*2); X.fill();
    X.fillStyle = '#000';
    X.fillRect(s*0.44, -s*0.22, 3, 3);
    X.fillRect(s*0.54, -s*0.22, 3, 3);
    X.fillStyle = '#3a2818';
    X.beginPath(); X.arc(s*0.38, -s*0.3, s*0.07, 0, Math.PI*2); X.fill();
    X.beginPath(); X.arc(s*0.62, -s*0.3, s*0.07, 0, Math.PI*2); X.fill();
    X.fillStyle = '#fff8c8'; X.font = `bold ${(s*0.12)|0}px Courier New`; X.textAlign='center';
    X.fillText('BEAR', s*0.5, s*0.5);
  }
}

function drawTopBrickPile(s, bricksLeft){
  X.fillStyle = 'rgba(0,0,0,0.35)';
  X.beginPath(); X.ellipse(0, s*0.5, s*0.85, s*0.18, 0, 0, Math.PI*2); X.fill();
  X.fillStyle = '#5a3818';
  X.fillRect(-s*0.85, s*0.25, s*1.7, s*0.18);
  X.fillStyle = '#3a2010';
  for (let i = 0; i < 4; i++){
    X.fillRect(-s*0.85, s*0.25 + i*s*0.06, s*1.7, s*0.02);
  }
  const rows = [4, 3, 2, 1];
  let drawn = 0;
  const total = 10;
  const stillThere = bricksLeft;
  for (let r = 0; r < rows.length; r++){
    const count = rows[r];
    const rowY = s*0.10 - r*s*0.20;
    const bw = s*0.32, bh = s*0.18;
    const totalW = count * bw + (count - 1) * s*0.02;
    const startX = -totalW/2;
    for (let i = 0; i < count; i++){
      const bx = startX + i*(bw + s*0.02);
      const idx = drawn++;
      if (idx >= total - stillThere){
        X.fillStyle = '#9a4828';
        X.fillRect(bx, rowY, bw, bh);
        X.fillStyle = '#b85a30';
        X.fillRect(bx, rowY, bw, bh*0.25);
        X.fillStyle = '#5a2810';
        X.fillRect(bx, rowY + bh*0.75, bw, bh*0.25);
        X.strokeStyle = '#3a1808';
        X.lineWidth = 1;
        X.strokeRect(bx, rowY, bw, bh);
        X.strokeStyle = '#7a3818'; X.lineWidth = 1;
        X.beginPath();
        X.moveTo(bx + bw*0.5, rowY + 2);
        X.lineTo(bx + bw*0.5, rowY + bh - 2);
        X.stroke();
      }
    }
  }
  X.fillStyle = '#1a1108';
  X.fillRect(-s*0.4, s*0.55, s*0.8, s*0.18);
  X.strokeStyle = '#a07028'; X.lineWidth = 1;
  X.strokeRect(-s*0.4, s*0.55, s*0.8, s*0.18);
  X.fillStyle = '#d4a058';
  X.font = `bold ${Math.max(9, (s*0.13)|0)}px Courier New`;
  X.textAlign = 'center';
  X.fillText(`${bricksLeft} / 10`, 0, s*0.68);
}

// ---- the Grabby: tall upright humanoid, billboard-style ----
// Feet anchored at the world position; a thin tapering body rises with a
// smooth, featureless bulbous head bowed forward, and a writhing curtain
// of long tendril-arms hangs down toward the ground. It leans toward the
// prey and reaches further on a lunge. A faint static aura thickens when
// it is aware. Drawn as a screen-upright billboard (not rotated to facing)
// so it always looms front-on, like the reference silhouette.
function drawGrabbyTop(g, cam){
  const sx = g.x - cam.x, sy = g.y - cam.y;
  if (sx < -260 || sx > W+260 || sy < -360 || sy > H+260) return;

  const lunge  = (g.state === 'lunge');
  const windup = (g.state === 'windup');
  const reach  = lunge ? 1.32 : (windup ? 1.12 : 1.0);
  const lr = g.radius;
  const t  = TROPHY.t;
  const aware  = g.knowsPlayer || g.losMemoryT > 0 || windup || lunge;
  const bright = (windup || lunge || g.flashT > 0);

  const BODY   = '#04060a';            // near-black, cold
  const HEIGHT = lr*3.8;               // feet -> crown
  const headR  = lr*0.60;
  const leanX  = clamp(Math.cos(g.facing), -1, 1);   // horizontal lean to prey
  const sway   = Math.sin(t*1.1 + g.walk*0.25) * lr*0.10;
  const topX   = leanX*lr*0.55*reach + sway;

  // central spine: p in 0..1 (0 = feet, 1 = crown)
  const spine = (p) => ({ x: topX*p*p, y: -HEIGHT*reach*p });

  // ---------- ground shadow at the feet ----------
  X.fillStyle = 'rgba(0,0,0,0.5)';
  X.beginPath();
  X.ellipse(sx, sy + lr*0.16, lr*1.45, lr*0.46, 0, 0, Math.PI*2);
  X.fill();

  // ---------- alien static aura around the standing figure ----------
  const auraI  = bright ? 1.0 : (aware ? 0.6 : 0.28);
  const moteN  = 20 + (aware ? 12 : 0);
  const auraCY = sy - HEIGHT*0.55;
  for (let i = 0; i < moteN; i++){
    const fl = _seedRand(i*7 + Math.floor(t*22) % 9);
    if (fl < 0.35) continue;
    const ang = (i / moteN) * Math.PI*2 + t*0.6;
    const rad = lr*0.9 + _seedRand(i*3)*lr*1.1 + Math.sin(t*8+i)*3;
    const mx = sx + Math.cos(ang)*rad;
    const my = auraCY + Math.sin(ang)*rad*1.5;
    X.fillStyle = aware
      ? `rgba(255,${40+i%30},30,${0.10*auraI*fl})`
      : `rgba(120,140,160,${0.07*auraI*fl})`;
    X.fillRect(mx, my, 2, 2);
  }

  X.save();
  X.translate(sx, sy);                  // origin at the feet
  X.lineCap = 'round';
  X.lineJoin = 'round';

  // ---------- thin tapering body column ----------
  const sh = spine(0.82), hip = spine(0.32), feet = spine(0.04);
  X.fillStyle = BODY;
  X.beginPath();
  X.moveTo(feet.x - lr*0.10, feet.y);
  X.bezierCurveTo(hip.x - lr*0.22, hip.y, sh.x - lr*0.34, sh.y + lr*0.2, sh.x - lr*0.30, sh.y - lr*0.10);
  X.lineTo(sh.x + lr*0.30, sh.y - lr*0.10);
  X.bezierCurveTo(sh.x + lr*0.34, sh.y + lr*0.2, hip.x + lr*0.22, hip.y, feet.x + lr*0.10, feet.y);
  X.closePath(); X.fill();
  // cold rim sheen down one flank
  X.strokeStyle = 'rgba(90,120,150,0.16)'; X.lineWidth = lr*0.05;
  X.beginPath();
  X.moveTo(sh.x - lr*0.26, sh.y);
  X.bezierCurveTo(hip.x - lr*0.16, hip.y, feet.x - lr*0.04, feet.y, feet.x - lr*0.02, feet.y);
  X.stroke();

  // ---------- the curtain of long dangling tendril-arms ----------
  // originate at the shoulders, hang down and splay outward to the
  // ground, writhing. Drawn over the body so they drape in front.
  const shoulder = spine(0.80);
  const NT = 11;
  for (let i = 0; i < NT; i++){
    const u  = (i/(NT-1))*2 - 1;                  // -1..1 across shoulders
    const ox = shoulder.x + u*headR*1.6;
    const oy = shoulder.y + Math.abs(u)*lr*0.16;
    const tipSpread = u*lr*(1.6 + 0.5*reach);
    const dropLen   = HEIGHT*(0.74 + 0.14*reach);
    const ph   = i*1.3;
    const segs = 5;
    let px = ox, py = oy;
    for (let s = 1; s <= segs; s++){
      const f   = s/segs;
      const wob = Math.sin(t*2.2 + ph + f*3) * lr*0.16 * f * (aware ? 1.5 : 1);
      const nx  = ox + tipSpread*f*f + wob + leanX*lr*0.45*reach*f;
      const ny  = oy + dropLen*f;
      X.strokeStyle = BODY; X.lineWidth = lr*0.15*(1 - f*0.7);
      X.beginPath(); X.moveTo(px, py); X.lineTo(nx, ny); X.stroke();
      px = nx; py = ny;
    }
    X.fillStyle = BODY;
    X.beginPath(); X.arc(px, py, lr*0.045, 0, Math.PI*2); X.fill();
  }

  // ---------- neck + smooth bulbous head, bowed forward ----------
  const neck = spine(0.86), head = spine(1.0);
  X.strokeStyle = BODY; X.lineWidth = lr*0.32;
  X.beginPath(); X.moveTo(neck.x, neck.y); X.lineTo(head.x, head.y + headR*0.7); X.stroke();

  X.save();
  X.translate(head.x, head.y + headR*0.2);
  X.rotate(leanX*0.25);                          // bow toward the prey
  // smooth dark egg-head
  X.fillStyle = '#0a0d12';
  X.beginPath(); X.ellipse(0, 0, headR*0.82, headR*1.12, 0, 0, Math.PI*2); X.fill();
  // cold sheen on the crown (featureless, smooth)
  const hg = X.createRadialGradient(-headR*0.25, -headR*0.45, 0, 0, 0, headR*1.25);
  hg.addColorStop(0, 'rgba(125,145,170,0.50)');
  hg.addColorStop(0.5, 'rgba(40,52,66,0.22)');
  hg.addColorStop(1, 'rgba(10,13,18,0)');
  X.fillStyle = hg;
  X.beginPath(); X.ellipse(0, 0, headR*0.82, headR*1.12, 0, 0, Math.PI*2); X.fill();
  // faint sunken eyes — only a hint, brighter when aware (keeps the menace)
  if (aware || bright){
    const glowA = bright ? 0.6 : 0.3;
    const eyeR  = headR*0.12;
    for (const ex of [-headR*0.28, headR*0.28]){
      const ey = headR*0.14;
      X.fillStyle = `rgba(255,40,28,${glowA})`;
      X.beginPath(); X.arc(ex, ey, eyeR*2.2, 0, Math.PI*2); X.fill();
      X.fillStyle = bright ? '#ff5038' : '#c01c10';
      X.beginPath(); X.arc(ex, ey, eyeR, 0, Math.PI*2); X.fill();
    }
  }
  X.restore();

  X.restore();

  // ---------- windup tell ring on the ground ----------
  if (windup){
    const p = g.stateT / 0.45;
    const rr = g.radius + 4 + p*16;
    X.strokeStyle = `rgba(255,40,40,${0.8 - p*0.5})`;
    X.lineWidth = 3;
    X.beginPath();
    X.ellipse(sx, sy + lr*0.16, rr, rr*0.42, 0, 0, Math.PI*2);
    X.stroke();
  }
}

function drawAllyTop(a, cam){
  if (a.dead) return;
  const sx = a.x - cam.x, sy = a.y - cam.y;
  X.fillStyle = 'rgba(0,0,0,0.45)';
  X.beginPath(); X.ellipse(sx, sy+5, a.radius+4, 6, 0, 0, Math.PI*2); X.fill();
  X.save();
  X.translate(sx, sy);
  X.rotate(a.facing);
  if (a.kind === 'bear'){
    X.fillStyle = '#3a2818';
    X.beginPath(); X.arc(0, 0, a.radius, 0, Math.PI*2); X.fill();
    X.fillStyle = '#5a3a20';
    X.beginPath(); X.arc(0, 0, a.radius*0.55, 0, Math.PI*2); X.fill();
    X.fillStyle = '#3a2818';
    X.beginPath(); X.arc(a.radius*0.85, 0, a.radius*0.5, 0, Math.PI*2); X.fill();
    X.fillStyle = '#5a3a20';
    X.beginPath(); X.arc(a.radius*1.1, 0, a.radius*0.22, 0, Math.PI*2); X.fill();
    X.fillStyle = '#3a2818';
    X.beginPath(); X.arc(a.radius*0.8, -a.radius*0.35, a.radius*0.13, 0, Math.PI*2); X.fill();
    X.beginPath(); X.arc(a.radius*0.8,  a.radius*0.35, a.radius*0.13, 0, Math.PI*2); X.fill();
    X.fillStyle = '#000';
    X.fillRect(a.radius*0.95, -a.radius*0.12, 2, 2);
    X.fillRect(a.radius*0.95,  a.radius*0.08, 2, 2);
  } else {
    X.fillStyle = '#c89858';
    X.beginPath(); X.arc(0, 0, a.radius, 0, Math.PI*2); X.fill();
    X.fillStyle = '#8a6028';
    X.beginPath(); X.arc(a.radius*0.7, 0, a.radius*0.6, 0, Math.PI*2); X.fill();
    X.fillStyle = '#c89858';
    X.beginPath(); X.arc(a.radius*0.85, 0, a.radius*0.42, 0, Math.PI*2); X.fill();
    X.beginPath(); X.arc(a.radius*0.78, -a.radius*0.3, a.radius*0.1, 0, Math.PI*2); X.fill();
    X.beginPath(); X.arc(a.radius*0.78,  a.radius*0.3, a.radius*0.1, 0, Math.PI*2); X.fill();
    X.fillStyle = '#000';
    X.fillRect(a.radius*0.95, -a.radius*0.1, 2, 2);
    X.fillRect(a.radius*0.95,  a.radius*0.08, 2, 2);
    X.strokeStyle = '#8a6028'; X.lineWidth = 4;
    X.beginPath();
    X.moveTo(-a.radius*0.8, 0);
    X.lineTo(-a.radius*1.4, Math.sin(a.walk)*8);
    X.stroke();
  }
  X.restore();
  const hpPct = a.hp / a.hpMax;
  X.fillStyle = 'rgba(0,0,0,0.6)';
  X.fillRect(sx - 20, sy - a.radius - 14, 40, 5);
  X.fillStyle = a.kind === 'bear' ? '#5a3a20' : '#c89858';
  X.fillRect(sx - 19, sy - a.radius - 13, 38 * hpPct, 3);
  X.fillStyle = '#fff'; X.font = '8px Courier New'; X.textAlign='center';
  X.fillText(a.kind.toUpperCase(), sx, sy - a.radius - 18);
}

function drawTrophyHUD(r){
  X.fillStyle = 'rgba(0,0,0,0.6)';
  X.fillRect(0, 0, W, 60);
  X.strokeStyle = '#3a2050'; X.lineWidth = 2;
  X.beginPath(); X.moveTo(0,60); X.lineTo(W,60); X.stroke();

  const hpPct = clamp(r.grabby.hp / r.grabby.hpMax, 0, 1);
  X.fillStyle = '#1a0820'; X.fillRect(20, 14, 360, 16);
  X.fillStyle = '#a01828'; X.fillRect(22, 16, 356 * hpPct, 12);
  X.strokeStyle = '#c8284a'; X.lineWidth = 1; X.strokeRect(20, 14, 360, 16);
  X.fillStyle = '#e8c0c8'; X.font = 'bold 11px Courier New'; X.textAlign = 'left';
  X.fillText(`GRABBY  ${Math.max(0,r.grabby.hp|0)} / ${r.grabby.hpMax}`, 24, 12);

  const goalPct = clamp(r.grabby.dmgDealt / 4000, 0, 1);
  X.fillStyle = '#0a2030'; X.fillRect(20, 38, 360, 12);
  X.fillStyle = goalPct >= 1 ? '#28c878' : '#3aa0d8';
  X.fillRect(22, 40, 356 * goalPct, 8);
  X.strokeStyle = '#3a8acc'; X.lineWidth = 1; X.strokeRect(20, 38, 360, 12);
  X.fillStyle = '#bcd4e8'; X.font = '10px Courier New';
  X.fillText(`DAMAGE  ${Math.min(4000, r.grabby.dmgDealt|0)} / 4000  →  ESCAPE`, 24, 36);

  X.textAlign = 'right';
  X.fillStyle = '#cfd6dd'; X.font = '11px Courier New';
  X.fillText('THE TROPHY ROOM', W-20, 22);
  X.fillStyle = '#9aa4ac'; X.font = '10px Courier New';
  X.fillText('WASD · MOUSE aim · HOLD E · CLICK throw', W-20, 38);

  {
    const g = r.grabby;
    let label = '', col = '#aaa';
    if (g.state === 'retreat'){
      label = 'RETREATING'; col = '#80ddff';
    } else if (g.knowsPlayer || g.losMemoryT > 0){
      label = '⚠ SPOTTED'; col = '#ff4040';
    } else if (g.state === 'search'){
      label = '? SEARCHING'; col = '#ffd040';
    } else if (g.state === 'patrol'){
      label = '✓ HIDDEN'; col = '#40d878';
    } else {
      label = '✓ HIDDEN'; col = '#40d878';
    }
    X.textAlign = 'center';
    X.fillStyle = 'rgba(0,0,0,0.55)';
    X.fillRect(W/2 - 80, 10, 160, 22);
    X.strokeStyle = col; X.lineWidth = 1;
    X.strokeRect(W/2 - 80, 10, 160, 22);
    X.fillStyle = col; X.font = 'bold 11px Courier New';
    X.fillText(label, W/2, 26);
  }

  if (r.player.brickHeld > 0){
    X.fillStyle = '#a8643a'; X.fillRect(W/2 - 30, 14, 60, 36);
    X.strokeStyle = '#3a1808'; X.lineWidth = 2; X.strokeRect(W/2 - 30, 14, 60, 36);
    X.fillStyle = '#fff'; X.font = 'bold 10px Courier New'; X.textAlign='center';
    X.fillText('BRICK READY', W/2, 28);
    X.font = '9px Courier New';
    X.fillText('LEFT-CLICK', W/2, 42);
  }

  if (r.prompt){
    const tr = r.trophies[r.promptIdx];
    const sx = tr.x - r.cam.x, sy = tr.y - r.cam.y;
    X.textAlign='center';
    const pw = X.measureText(r.prompt).width + 16;
    X.fillStyle = 'rgba(0,0,0,0.78)';
    X.fillRect(sx - pw/2, sy - tr.size - 32, pw, 22);
    X.strokeStyle = '#88ddff'; X.lineWidth = 1;
    X.strokeRect(sx - pw/2, sy - tr.size - 32, pw, 22);
    X.fillStyle = '#aaeeff'; X.font = 'bold 11px Courier New';
    X.fillText(r.prompt, sx, sy - tr.size - 17);
  }

  if (r.hintT > 0){
    const a = clamp(r.hintT/2, 0, 1);
    X.fillStyle = `rgba(0,0,0,${0.65*a})`;
    X.fillRect(W/2-280, H-50, 560, 30);
    X.strokeStyle = `rgba(180,120,255,${0.7*a})`; X.lineWidth = 1;
    X.strokeRect(W/2-280, H-50, 560, 30);
    X.fillStyle = `rgba(220,200,255,${a})`;
    X.font = '12px Courier New'; X.textAlign='center';
    X.fillText(r.hint, W/2, H-30);
  }

  if (r.exitFlashT > 0){
    const a = r.exitFlashT;
    X.fillStyle = `rgba(120,220,255,${0.22*a})`;
    X.fillRect(0,0,W,H);
    X.fillStyle = `rgba(180,240,255,${0.95*a})`;
    X.font = 'bold 28px Courier New'; X.textAlign='center';
    X.fillText('EXIT UNLOCKED', W/2, 200);
  }
}

/* ============================================================
   DEATH
   ============================================================ */
function drawDead(dt){
  G.deathT += dt;
  X.fillStyle='#03060a'; X.fillRect(0,0,W,H);
  for (let i=0;i<60;i++){
    X.fillStyle = `rgba(120,40,40,${Math.random()*0.12})`;
    X.fillRect(Math.random()*W, Math.random()*H, 3,3);
  }
  X.textAlign='center';
  const a = clamp(G.deathT/0.8,0,1);
  X.globalAlpha=a;
  X.fillStyle=COL.red; X.font='bold 52px Courier New';
  X.shadowColor='rgba(255,60,40,0.5)'; X.shadowBlur=24;
  X.fillText('BLACKOUT', W/2, H*0.4);
  X.shadowBlur=0;
  X.fillStyle=COL.textP; X.font='18px Courier New';
  X.fillText(G.deathReason||'YOU DIED', W/2, H*0.4+44);
  X.globalAlpha=1;
  if (G.deathT>1.0){
    const p=0.5+Math.sin(G.deathT*4)*0.5;
    X.globalAlpha=p;
    X.fillStyle=COL.textD; X.font='14px Courier New';
    X.fillText('press R to retry Act 1   ·   press M for title', W/2, H*0.66);
    X.globalAlpha=1;
  }
  if (keys['r'] && G.deathT>1.0){ keys['r']=false; initAct1(); G.state='act1'; }
  if (keys['m'] && G.deathT>1.0){ keys['m']=false; G.state='title'; }
}

/* ============================================================
   ENDING  (of this build)
   ============================================================ */
const END = { t:0, stars: makeStars(220) };
function drawEnding(dt){
  END.t+=dt;
  const sky=X.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#02030a'); sky.addColorStop(0.6,'#06081a'); sky.addColorStop(1,'#101830');
  X.fillStyle=sky; X.fillRect(0,0,W,H);
  drawStars(END.stars, END.t);
  drawMeteors(dt);
  const pr = Math.min(300, 120+END.t*22);
  const py = H+220 - Math.min(200, END.t*26);
  const pg=X.createRadialGradient(W*0.5-pr*0.3, py-pr*0.3, pr*0.2, W*0.5, py, pr);
  pg.addColorStop(0,'#bfe0ff'); pg.addColorStop(0.5,'#4a78a8');
  pg.addColorStop(0.85,'#16324a'); pg.addColorStop(1,'#040a12');
  X.fillStyle=pg; X.beginPath(); X.arc(W*0.5,py,pr,0,Math.PI*2); X.fill();

  const shipT = clamp(END.t/4,0,1);
  drawShip(W*0.5, lerp(H+80, H*0.34, shipT*(2-shipT)), lerp(1.1,0.5,shipT), END.t);

  const ta = clamp((END.t-2.5)/1.5,0,1);
  if (ta>0){
    X.globalAlpha=ta; X.textAlign='center';
    X.fillStyle=COL.cyan; X.font='bold 54px Courier New';
    X.shadowColor='rgba(90,200,255,0.6)'; X.shadowBlur=26;
    X.fillText('TO BE CONTINUED', W/2, H*0.18);
    X.shadowBlur=0;
    X.fillStyle=COL.textP; X.font='italic 16px Courier New';
    X.fillText('the cold world is still down there. the lights are still off.', W/2, H*0.18+30);
    X.globalAlpha=1;
  }
  const ca=clamp((END.t-4.5)/1.5,0,1);
  if (ca>0){
    X.globalAlpha=ca; X.textAlign='center';
    X.fillStyle=COL.amber; X.font='bold 16px Courier New';
    X.fillText('BLACKOUT  ·  SPACE', W/2, H-92);
    X.fillStyle=COL.textD; X.font='12px Courier New';
    X.fillText('the sequel to BLACKOUT · DUNES  ·  Act 1 playable — Acts 2–4 incoming', W/2, H-70);
    X.fillStyle=COL.textD; X.font='11px Courier New';
    X.fillText('press R to play again  ·  press M for title', W/2, H-40);
    X.globalAlpha=1;
  }
  if (keys['r'] && END.t>4.5){ keys['r']=false; END.t=0; initAct1(); G.state='act1'; }
  if (keys['m'] && END.t>4.5){ keys['m']=false; END.t=0; G.state='title'; }
}

/* ============================================================
   MAIN LOOP  (matches DUNES: dt clamp, fade on scene change)
   ============================================================ */
function loop(now){
  const dt = Math.min(0.05, (now-last)/1000);
  last = now;
  G.t += dt;

  let pk='';
  if (G.state==='act1') pk = ACT1.phase;
  else if (STUB && (G.state==='act2'||G.state==='act3'||G.state==='act4')) pk=String(STUB.num);
  const sk = G.state+':'+pk;
  if (G._sk===undefined) G._sk=sk;
  if (sk!==G._sk){ G._sk=sk; G.fade=1; G.fadeTarget=0; }
  G.fade = lerp(G.fade, G.fadeTarget, 1-Math.pow(0.002,dt));

  X.save();
  if (G.shake>0){
    const s=G.shake;
    X.translate((Math.random()-0.5)*s, (Math.random()-0.5)*s);
    G.shake = Math.max(0, G.shake - dt*40);
  }

  if (keys['tab'] && !G._tabP){
    G._tabP = true;
    const skippable = ['title','recap','howto','act1','briefing','act2','act3','act4','dead','ending'];
    if (G.state === 'skipmenu'){
      G.state = G._skipReturn || 'title';
      SKIP.t = 0;
    } else if (skippable.includes(G.state)){
      G._skipReturn = G.state;
      G.state = 'skipmenu';
      SKIP.t = 0; SKIP.sel = 0;
    }
  }
  if (!keys['tab']) G._tabP = false;

  try {
    switch(G.state){
      case 'title':    drawTitle(dt); break;
      case 'recap':    drawRecap(dt); break;
      case 'howto':    drawHowTo(dt); break;
      case 'skipmenu': drawSkipMenu(dt); break;
      case 'act1':     updateAct1(dt); drawAct1(dt); break;
      case 'briefing': updateBriefing(dt); drawBriefing(dt); break;
      case 'act2':     updateAct2(dt); drawAct2(dt); break;
      case 'act3':
      case 'act4':     drawStub(dt); break;
      case 'dead':     drawDead(dt); break;
      case 'ending':   drawEnding(dt); break;
    }
  } catch(err){ console.error('Frame error:', err); }

  X.restore();

  if (G.fade>0.01){
    X.fillStyle = `rgba(2,3,8,${clamp(G.fade,0,1)})`;
    X.fillRect(0,0,W,H);
  }

  mouse.justDown=false;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ============================================================
   SKIP MENU  —  jump straight to any built section.
   ============================================================ */
const SKIP = {
  t: 0,
  sel: 0,
  open: { 'Start': true, 'Act 1 — Desert': false, 'Briefing': true, 'Act 2 — Trophy Room': true },
  hover: -1,
  items: [
    { group:'Start', label:'Title screen',
      go:()=>{ G.state='title'; } },
    { group:'Start', label:'Recap (DUNES → SPACE)',
      go:()=>{ RECAP.t=0; G.state='recap'; } },
    { group:'Start', label:'How to play',
      go:()=>{ G.state='howto'; } },

    { group:'Act 1 — Desert', label:'Start of Act 1 (Pressure Chamber)',
      go:()=>{ initAct1(); G.state='act1'; } },
    { group:'Act 1 — Desert', label:'Explore the maze',
      go:()=>{ initAct1(); ACT1.phase='explore'; ACT1.phaseT=0;
               ACT1.p.x=200; ACT1.p.y=ACT1_H-220; G.state='act1'; } },
    { group:'Act 1 — Desert', label:'At the crane (with manifest)',
      go:()=>{ initAct1(); ACT1.knowsNum=true; ACT1.phase='explore';
               ACT1.phaseT=0;
               ACT1.p.x=ACT1.craneT.x+ACT1.craneT.w+30;
               ACT1.p.y=ACT1.craneT.y+ACT1.craneT.d/2;
               G.state='act1'; } },
    { group:'Act 1 — Desert', label:'Climbing the crane',
      go:()=>{ initAct1(); ACT1.knowsNum=true; ACT1.view='side';
               ACT1.phase='climb'; ACT1.phaseT=0; a1BuildRig();
               ACT1.sp.x=ACT1.rig.baseX-10; ACT1.sp.y=ACT1.rig.floorY;
               ACT1.sp.onGround=true; G.state='act1'; } },
    { group:'Act 1 — Desert', label:'At the terminal (with code)',
      go:()=>{ initAct1(); ACT1.knowsNum=true; ACT1.hasCode=true;
               ACT1.phase='explore'; ACT1.phaseT=0;
               ACT1.p.x=ACT1.target.x-30; ACT1.p.y=ACT1.target.y+ACT1.target.d/2;
               G.state='act1'; } },
    { group:'Act 1 — Desert', label:'Opening the crate',
      go:()=>{ initAct1(); ACT1.knowsNum=true; ACT1.hasCode=true;
               ACT1.phase='opening'; ACT1.phaseT=0; ACT1.lid=0;
               G.state='act1'; } },

    { group:'Briefing', label:'Briefing Hall (Greensboro DNR)',
      go:()=>{ initBriefing(); } },

    { group:'Act 2 — Trophy Room', label:'Enter the Trophy Room',
      go:()=>{ initAct2(); } },
  ],
};

function drawSkipMenu(dt){
  SKIP.t += dt;

  const sky = X.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#02030a'); sky.addColorStop(0.6,'#06081a'); sky.addColorStop(1,'#0a1230');
  X.fillStyle = sky; X.fillRect(0,0,W,H);
  drawStars(TITLE.stars, SKIP.t);

  X.textAlign = 'center';
  X.fillStyle = COL.cyan; X.font = 'bold 38px Courier New';
  X.shadowColor = 'rgba(90,200,255,0.5)'; X.shadowBlur = 20;
  X.fillText('BLACK OUT', W/2, 64);
  X.shadowBlur = 0;
  X.fillStyle = COL.textD; X.font = '12px Courier New';
  X.fillText('Pick where to go', W/2, 84);

  const rows = [];
  const items = SKIP.items;
  const groupSet = [];
  for (const it of items){
    if (!groupSet.includes(it.group)) groupSet.push(it.group);
  }
  for (const gname of groupSet){
    const isOpen = !!SKIP.open[gname];
    rows.push({ type:'header', group:gname, isOpen });
    if (isOpen){
      for (let i=0;i<items.length;i++){
        if (items[i].group === gname){
          rows.push({ type:'item', itemIdx: i });
        }
      }
    }
  }
  if (SKIP.sel >= rows.length) SKIP.sel = rows.length - 1;
  if (SKIP.sel < 0) SKIP.sel = 0;

  if (keys['arrowdown'] && !SKIP._dnP){
    SKIP._dnP = true;
    SKIP.sel = (SKIP.sel + 1) % rows.length;
  }
  if (!keys['arrowdown']) SKIP._dnP = false;

  if (keys['arrowup'] && !SKIP._upP){
    SKIP._upP = true;
    SKIP.sel = (SKIP.sel - 1 + rows.length) % rows.length;
  }
  if (!keys['arrowup']) SKIP._upP = false;

  if (keys['enter'] && !SKIP._entP){
    SKIP._entP = true;
    const row = rows[SKIP.sel];
    if (row.type === 'header'){
      SKIP.open[row.group] = !SKIP.open[row.group];
    } else {
      items[row.itemIdx].go();
      return;
    }
  }
  if (!keys['enter']) SKIP._entP = false;

  if (keys[' '] && !SKIP._spP){
    SKIP._spP = true;
    const row = rows[SKIP.sel];
    if (row.type === 'header'){
      SKIP.open[row.group] = !SKIP.open[row.group];
    }
  }
  if (!keys[' ']) SKIP._spP = false;

  if (keys['escape'] && !SKIP._escP){
    SKIP._escP = true;
    G.state = G._skipReturn || 'title';
    return;
  }
  if (!keys['escape']) SKIP._escP = false;

  const panelX = W/2 - 240;
  const panelW = 480;
  const startY = 130;
  const rowH = 30;
  const headerH = 36;

  let mouseRow = -1;
  let yScan = startY;
  for (let i=0;i<rows.length;i++){
    const h = rows[i].type === 'header' ? headerH : rowH;
    if (mouse.y >= yScan && mouse.y < yScan + h &&
        mouse.x >= panelX && mouse.x <= panelX + panelW){
      mouseRow = i;
    }
    yScan += h;
  }
  if (mouseRow >= 0) SKIP.hover = mouseRow;

  if (mouse.justDown && mouseRow >= 0){
    mouse.justDown = false;
    SKIP.sel = mouseRow;
    const row = rows[mouseRow];
    if (row.type === 'header'){
      SKIP.open[row.group] = !SKIP.open[row.group];
    } else {
      items[row.itemIdx].go();
      return;
    }
  }

  X.fillStyle = 'rgba(8,12,30,0.55)';
  X.fillRect(panelX - 12, 110, panelW + 24, H - 200);
  X.strokeStyle = 'rgba(90,200,255,0.25)'; X.lineWidth = 1;
  X.strokeRect(panelX - 12, 110, panelW + 24, H - 200);

  let y = startY;
  X.textAlign = 'left';
  for (let i=0;i<rows.length;i++){
    const row = rows[i];
    const isSel = (i === SKIP.sel);
    const isHover = (i === SKIP.hover);

    if (row.type === 'header'){
      const h = headerH;
      if (isSel || isHover){
        X.fillStyle = isSel ? 'rgba(255,210,74,0.10)' : 'rgba(255,255,255,0.04)';
        X.fillRect(panelX, y, panelW, h);
      }
      X.fillStyle = isSel ? '#ffd24a' : '#7fb0d0';
      X.font = 'bold 14px Courier New';
      X.fillText(row.isOpen ? '▾' : '▸', panelX + 12, y + 24);
      X.fillStyle = isSel ? '#ffd24a' : (row.isOpen ? '#c7ccd2' : '#9aa4ac');
      X.font = 'bold 16px Courier New';
      X.fillText(row.group, panelX + 36, y + 24);
      const count = items.filter(it => it.group === row.group).length;
      X.fillStyle = '#5a6068';
      X.font = '11px Courier New';
      X.fillText(`(${count})`, panelX + panelW - 40, y + 24);
      X.strokeStyle = 'rgba(120,140,170,0.15)'; X.lineWidth = 1;
      X.beginPath(); X.moveTo(panelX, y + h - 1); X.lineTo(panelX + panelW, y + h - 1); X.stroke();
      y += h;
    } else {
      const h = rowH;
      if (isSel || isHover){
        X.fillStyle = isSel ? 'rgba(255,210,74,0.12)' : 'rgba(255,255,255,0.04)';
        X.fillRect(panelX, y, panelW, h);
      }
      X.fillStyle = isSel ? '#ffd24a' : '#c7ccd2';
      X.font = isSel ? 'bold 14px Courier New' : '14px Courier New';
      X.fillText('›  ' + items[row.itemIdx].label, panelX + 36, y + 20);
      y += h;
    }
  }

  X.textAlign = 'center';
  X.fillStyle = COL.textD; X.font = '12px Courier New';
  X.fillText('↑↓ select  ·  ENTER expand or jump  ·  click to jump', W/2, H - 56);
  X.fillStyle = '#7a7f87'; X.font = '11px Courier New';
  X.fillText('TAB or ESC to close', W/2, H - 36);
}
